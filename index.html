<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --glow: rgba(255, 219, 234, 0.8);
        }

        body {
            background: linear-gradient(135deg, #fdfbf7 0%, #fff5f8 100%);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            text-align: center;
        }

        .logo-text {
            width: 95%; 
            max-width: 1300px;
            height: auto;
            filter: drop-shadow(0 20px 40px var(--glow));
            animation: float 6s ease-in-out infinite;
            z-index: 2;
        }

        .pfp-png {
            width: 320px; /* Очень крупная аватарка */
            height: auto;
            margin-top: -120px; /* Плотно к логотипу */
            filter: drop-shadow(0 15px 25px var(--glow));
            z-index: 1;
            /* Убрали круг, рамки и фон */
        }

        nav {
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.4);
            padding: 25px 80px;
            border-radius: 100px;
            backdrop-filter: blur(15px);
            border: 1px solid white;
        }

        nav a {
            text-decoration: none;
            color: var(--mauve-text);
            margin: 0 35px;
            transition: 0.3s;
            font-weight: 500;
            font-size: 1.6rem;
        }

        nav a:hover { color: #ff9ec7; text-shadow: 0 0 15px var(--soft-pink); }

        .tagline {
            color: var(--mauve-text);
            font-size: 2.5rem;
            margin-top: 80px;
            font-weight: 300;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <header>
        <img src="font.png" alt="astagme" class="logo-text">
        <img src="ava.png" alt="Asta" class="pfp-png">
        <nav>
            <a href="index.html">home</a>
            <a href="branding.html">branding</a>
            <a href="art.html">art</a>
            <a href="info.html">info</a>
        </nav>
        <h1 class="tagline">i create brands people fall in love with</h1>
    </header>
</body>
</html>
