<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ДИНАМИЧЕСКИЙ ФОН */
        .bg-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--soft-pink) 0%, rgba(255,255,255,0) 70%);
            filter: blur(50px);
            z-index: -1;
            border-radius: 50%;
            opacity: 0.6;
            pointer-events: none;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР (Сборка всей композиции) */
        .main-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border: 2px solid white;
            border-radius: 60px;
            padding: 60px 40px;
            box-shadow: 0 20px 50px rgba(244, 194, 215, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 700px;
            width: 90%;
            animation: cardFloat 10s infinite ease-in-out;
            z-index: 10;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        /* ЛОГОТИП С ПЛАВНЫМ ВДОХОМ */
        .logo-main {
            max-width: 500px;
            width: 100%;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 15px rgba(244, 194, 215, 0.4));
            /* Переход стал очень длинным для мягкости */
            transition: all 1.5s cubic-bezier(0.25, 0.1, 0.25, 1);
            animation: logoBreath 6s infinite ease-in-out;
        }

        @keyframes logoBreath {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        .logo-main:hover {
            filter: drop-shadow(0 0 25px var(--soft-pink));
            transform: scale(1.05) !important; /* Очень аккуратное увеличение */
        }

        /* АВАТАРКА IMVU */
        .ava-wrapper {
            margin-bottom: 25px;
            position: relative;
        }

        .ava-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--brown-outline);
            background: white;
            box-shadow: 10px 10px 0px var(--soft-pink);
            transition: 0.5s ease;
        }

        .ava-wrapper:hover .ava-img {
            transform: scale(1.1) rotate(-5deg);
            box-shadow: 15px 15px 0px var(--strong-pink);
        }

        /* ТЕКСТ ПОДПИСИ */
        .hero-subtitle {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            color: var(--mauve-text);
            font-weight: 600;
            border-top: 1px solid var(--soft-pink);
            padding-top: 15px;
        }

        /* КНОПКИ */
        .cta-container { display: flex; gap: 30px; }

        .enter-btn {
            text-decoration: none;
            color: var(--brown-outline);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            padding: 18px 45px;
            border: 3px solid var(--brown-outline);
            border-radius: 50px;
            background: white;
            box-shadow: 8px 8px 0px var(--soft-pink);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important;
        }

        .enter-btn:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--strong-pink);
            background: var(--bg-cream);
        }

        /* МАГИЧЕСКИЙ КУРСОР (кастомный) */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            transition: transform 0.1s ease;
        }

        .cursor-active { transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important; background: var(--soft-pink) !important; }

        @media (max-width: 850px) {
            #custom-cursor, .bg-blob { display: none !important; }
            body { cursor: auto !important; }
            .main-card { padding: 40px 20px; }
            .logo-main { max-width: 300px; }
            .ava-img { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="bg-blob" id="blob1"></div>
    <div class="bg-blob" id="blob2"></div>

    <div class="main-card">
        <div class="ava-wrapper">
            <img src="ava.png" alt="Astagme Avatar" class="ava-img">
        </div>

        <img src="font.png" alt="Astagme Logo" class="logo-main">
        
        <div class="hero-subtitle">
            Illustrator • UI/UX Designer • Web Developer
        </div>

        <div class="cta-container">
            <a href="catalog.html" class="enter-btn">Portfolio</a>
            <a href="about.html" class="enter-btn">About Me</a>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const blob1 = document.getElementById('blob1');
        const blob2 = document.getElementById('blob2');

        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Плавное движение фоновых сфер за курсором
            blob1.style.transform = `translate(${e.clientX * 0.05}px, ${e.clientY * 0.05}px)`;
            blob2.style.transform = `translate(${500 - e.clientX * 0.03}px, ${200 - e.clientY * 0.03}px)`;
        });

        document.querySelectorAll('.enter-btn, .logo-main, .ava-img').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });
    </script>
</body>
</html>
