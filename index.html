<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --star-yellow: #FFD700; /* Яркий жёлтый */
            --glow: rgba(255, 219, 234, 0.8);
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 200vh; /* Увеличили длину для скролла */
            overflow-x: hidden;
            position: relative;
        }

        /* --- МАГИЯ ЗВЁЗДНОГО НЕБА --- */
        .star-field {
            position: fixed; /* Зафиксированы на экране при скролле */
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none; /* Не мешают кликать */
        }

        .star {
            position: absolute;
            background: var(--star-yellow);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0.6;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4));
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.7) rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1.1) rotate(10deg); }
        }

        /* --- ПОЗИЦИИ И РАЗМЕРЫ (автоматическая расстановка) --- */
        /* Верхний левый угол */
        .star:nth-child(1) { top: 10%; left: 5%; width: 30px; height: 30px; animation: twinkle 3s infinite; }
        .star:nth-child(2) { top: 25%; left: 15%; width: 20px; height: 20px; animation: twinkle 4s infinite 1s; }
        .star:nth-child(3) { top: 5%; left: 20%; width: 15px; height: 15px; animation: twinkle 5s infinite 2s; }

        /* Верхний правый угол */
        .star:nth-child(4) { top: 15%; right: 10%; width: 35px; height: 35px; animation: twinkle 3.5s infinite; }
        .star:nth-child(5) { top: 30%; right: 18%; width: 20px; height: 20px; animation: twinkle 4s infinite 1.5s; }
        .star:nth-child(6) { top: 8%; right: 25%; width: 18px; height: 18px; animation: twinkle 6s infinite 3s; }

        /* Центр (вокруг контента) */
        .star:nth-child(7) { top: 45%; left: 30%; width: 25px; height: 25px; animation: twinkle 3.2s infinite; }
        .star:nth-child(8) { top: 60%; right: 28%; width: 30px; height: 30px; animation: twinkle 5s infinite 0.5s; }
        .star:nth-child(9) { top: 55%; left: 10%; width: 20px; height: 20px; animation: twinkle 4.5s infinite; }

        /* Низ страницы */
        .star:nth-child(10) { bottom: 10%; left: 8%; width: 35px; height: 35px; animation: twinkle 3.8s infinite; }
        .star:nth-child(11) { bottom: 20%; right: 5%; width: 25px; height: 25px; animation: twinkle 5.5s infinite 2s; }
        .star:nth-child(12) { bottom: 5%; right: 15%; width: 18px; height: 18px; animation: twinkle 6s infinite 4s; }
        .star:nth-child(13) { bottom: 30%; left: 20%; width: 22px; height: 22px; animation: twinkle 4.2s infinite 1s; }

        /* --- ОСНОВНЫЕ СТИЛИ (бренд и кнопки) --- */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            z-index: 10;
        }

        .brand-container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            gap: 10px; 
            width: 100%;
            max-width: 1300px;
            animation: float 6s ease-in-out infinite;
        }

        .pfp-png {
            width: 320px; 
            height: auto;
            filter: drop-shadow(0 15px 30px var(--glow));
        }

        .logo-text {
            width: 70%;
            max-width: 800px;
            height: auto;
            filter: drop-shadow(0 20px 40px var(--glow));
        }

        nav {
            margin-top: 60px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            background: rgba(255, 255, 255, 0.7);
            padding: 15px 35px;
            border-radius: 50px;
            border: 2px solid var(--strong-pink); 
            font-weight: 500;
            font-size: 1.2rem;
            transition: 0.3s all ease;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: var(--soft-pink);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--glow);
        }

        @media (max-width: 768px) {
            .brand-container { flex-direction: column; gap: 5px; }
            .pfp-png { width: 220px; }
            .logo-text { width: 95%; }
            .star-field { opacity: 0.4; } /* На мобильных меньше отвлекают */
        }
    </style>
</head>
<body>
    <div class="star-field">
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
    </div>

    <header>
        <div class="brand-container">
            <img src="ava.png" alt="Asta" class="pfp-png">
            <img src="font.png" alt="astagme" class="logo-text">
        </div>
        
        <nav>
            <a href="index.html" class="nav-btn">home</a>
            <a href="branding.html" class="nav-btn">branding</a>
            <a href="art.html" class="nav-btn">art</a>
            <a href="info.html" class="nav-btn">info</a>
        </nav>
    </header>
</body>
</html>
