<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #FF85B3; /* Яркий неон */
            --mauve-text: #63414C; /* Нейтральный контур */
            --bg-cream: #FDFBF7;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            animation: fadeInPage 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: linear-gradient(45deg, #fdfbf7, #ffdeeb, #fdfbf7, #e8d5ff);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #stars-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            pointer-events: none;
        }

        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--mauve-text);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 10px var(--strong-pink);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 12px var(--strong-pink), 0 0 20px white;
        }

        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .logo-main {
            max-width: 680px;
            width: 95%;
            margin-bottom: 15px;
            filter: drop-shadow(0 15px 30px rgba(244, 194, 215, 0.6));
            animation: logoBreath 12s infinite ease-in-out;
            will-change: transform, filter;
        }

        @keyframes logoBreath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03) translateY(-5px); }
        }

        .subtitle-wrapper {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 45px;
            padding: 12px 35px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid var(--soft-pink); 
            box-shadow: 0 10px 25px rgba(255, 133, 179, 0.15);
        }

        .hero-subtitle {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--mauve-text);
            margin: 0;
            text-shadow: 0 0 10px white, 0 0 15px var(--soft-pink), 0 0 5px var(--strong-pink);
        }

        .skill-bow {
            height: 45px;
            filter: drop-shadow(0 0 10px var(--soft-pink));
            animation: bowFloat 4s infinite ease-in-out;
        }

        @keyframes bowFloat {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.15) rotate(5deg); }
        }

        .ava-box {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 0 0 4px var(--mauve-text), 0 15px 35px rgba(255, 133, 179, 0.25);
            overflow: hidden;
            margin-bottom: 45px;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
        }
        .ava-box img { width: 100%; height: 100%; object-fit: cover; }

        /* КНОПКИ - ИСПРАВЛЕННЫЙ НЕЙТРАЛЬНЫЙ ВИД */
        .cta-group { display: flex; gap: 30px; }
        .enter-btn {
            text-decoration: none;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            padding: 18px 50px;
            /* ИСПРАВЛЕНО: Нейтральный контур по умолчанию */
            border: 3px solid var(--mauve-text); 
            border-radius: 50px;
            background: white;
            /* ИСПРАВЛЕНО: Нейтральная тень */
            box-shadow: 0 4px 15px rgba(100, 60, 70, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important;
        }

        /* КНОПКИ ПРИ НАВЕДЕНИИ - МАГИЯ ОСТАЕТСЯ */
        .enter-btn:hover {
            transform: translateY(-6px);
            /* ИСПРАВЛЕНО: Яркий неон только при наведении */
            border-color: var(--strong-pink); 
            box-shadow: 0 0 25px var(--strong-pink), 0 0 10px white;
            color: var(--mauve-text);
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="bg-gradient"></div>
    <canvas id="stars-canvas"></canvas>

    <main class="hero-container">
        <img src="font.png" alt="Astagme" class="logo-main">

        <div class="subtitle-wrapper">
            <img src="bow.png" alt="" class="skill-bow">
            <p class="hero-subtitle">Illustrator • UI/UX Designer • Web Developer</p>
            <img src="bow.png" alt="" class="skill-bow">
        </div>

        <div class="ava-box">
            <img src="ava.png" alt="Astagme Avatar">
        </div>

        <div class="cta-group">
            <a href="catalog.html" class="enter-btn">Portfolio</a>
            <a href="about.html" class="enter-btn">About Me</a>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.opacity = Math.random();
                this.speed = Math.random() * 0.02;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                this.opacity += this.speed;
                if (this.opacity > 1 || this.opacity < 0) this.speed = -this.speed;
            }
        }
        for (let i = 0; i < 150; i++) stars.push(new Star());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => { star.update(); star.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if (Math.random() > 0.6) {
                createSparkle(e.clientX, e.clientY);
            }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 8 + 4; 
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            
            sparkle.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*100}px, ${(Math.random()-0.5)*100}px) scale(0)`, opacity: 0 }
            ], { duration: 1200, easing: 'ease-out' });
            
            setTimeout(() => sparkle.remove(), 1200);
        }

        document.querySelectorAll('.enter-btn, .logo-main, .ava-box, .subtitle-wrapper').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1.6)';
                cursor.style.background = 'var(--soft-pink)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1)';
                cursor.style.background = 'white';
            });
        });
    </script>
</body>
</html>
