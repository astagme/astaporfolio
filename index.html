<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --star-yellow: #FFD700;
            --brown-outline: #63414C;
            --glow: rgba(255, 219, 234, 0.8);
        }

        /* --- БАЗОВЫЕ СТИЛИ И КУРСОР --- */
        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            cursor: none !important;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            color: var(--mauve-text);
        }

        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: rotate(-45deg) translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
        }

        #custom-cursor::after {
            content: '';
            position: absolute;
            width: 7px; height: 7px;
            background: var(--soft-pink);
            border-radius: 50%;
            top: 5px; left: 5px;
        }

        .cursor-active {
            transform: rotate(-45deg) translate(-50%, -50%) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        /* --- ЗВЕЗДЫ --- */
        .star-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star {
            position: absolute;
            background: var(--star-yellow);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle var(--duration) infinite ease-in-out;
            opacity: 0.4;
        }
        @keyframes twinkle { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.6; } }

        /* --- ГЛАВНЫЙ БЛОК --- */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Увеличили gap для более свободной композиции */
            gap: 20px; 
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .logo-text { 
            width: 650px; 
            max-width: 90vw;
            filter: drop-shadow(0 20px 40px var(--glow)); 
            margin-bottom: -10px; /* Немного сблизим с аватаркой */
        }

        /* ИСПРАВЛЕНО: Аватарка стала больше */
        .pfp-png { 
            width: 250px; /* Была 180px, стала 250px */
            filter: drop-shadow(0 15px 30px var(--glow)); 
        }

        /* Текст-подпись */
        .subtitle {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1rem;
            margin-top: -5px; /* Уменьшили верхний отступ */
            margin-bottom: 30px; /* Увеличили нижний отступ */
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* --- НАВИГАЦИЯ --- */
        nav {
            display: flex;
            gap: 25px;
        }

        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            padding: 15px 35px;
            border-radius: 50px;
            border: 2px solid var(--strong-pink);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(244, 194, 215, 0.3);
            cursor: none !important;
        }

        .nav-btn:hover {
            background: var(--soft-pink);
            color: white;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(244, 194, 215, 0.5);
        }

        /* Адаптив для телефонов */
        @media (max-width: 850px) {
            .logo-text { width: 90%; }
            .pfp-png { width: 180px; } /* Чуть меньше на телефонах */
            nav { flex-direction: column; gap: 15px; }
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="star-field"></div>

    <div class="main-content">
        <img src="font.png" alt="astagme" class="logo-text">
        <img src="ava.png" alt="Asta" class="pfp-png">
        
        <p class="subtitle">Digital Artist & Web Developer</p>

        <nav>
            <a href="index.html" class="nav-btn">Home</a>
            <a href="about.html" class="nav-btn">About Me</a>
            <a href="catalog.html" class="nav-btn">Catalog</a>
        </nav>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const buttons = document.querySelectorAll('.nav-btn');
        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            btn.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });

        const field = document.querySelector('.star-field');
        for (let i = 0; i < 18; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 20 + 10 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            field.appendChild(star);
        }
    </script>
</body>
</html>
