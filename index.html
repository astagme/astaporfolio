<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Illustrator & Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            opacity: 0; 
            transition: opacity 0.8s ease-out;
            cursor: none !important;
            color: var(--mauve-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body.fade-in { opacity: 1; }

        /* МАГИЧЕСКИЙ КУРСОР */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s;
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.6) !important;
            background: var(--soft-pink) !important;
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
            box-shadow: 0 0 10px var(--soft-pink);
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* ЛОГОТИП С МЯГКИМ ПРИБЛИЖЕНИЕМ */
        .logo-main {
            max-width: 600px;
            width: 80%;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(244, 194, 215, 0.4));
            cursor: none !important;
            animation: logoFloat 8s infinite ease-in-out;
            transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.5s ease;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-main:hover {
            transform: scale(1.06) !important;
            filter: drop-shadow(0 15px 30px rgba(244, 194, 215, 0.6));
        }

        /* БОЛЬШАЯ И ВАЖНАЯ IMVU-АВАТАРКА (ava.png) */
        .ava-container {
            position: relative;
            margin-bottom: 30px;
        }

        .ava-floating {
            /* МЫ СДЕЛАЛИ ЕЁ КРУПНОЙ! */
            width: 220px; 
            height: 220px;
            
            /* object-fit: cover, чтобы персонаж заполнял весь круг красиво */
            object-fit: cover; 
            border-radius: 50%;
            border: 4px solid var(--brown-outline);
            background: white;
            box-shadow: 8px 8px 0px var(--soft-pink);
            cursor: none !important;
            transition: 0.4s ease;
            animation: avaFloat 5s infinite ease-in-out;
        }

        .ava-container:hover .ava-floating {
            transform: scale(1.05) rotate(3deg);
            box-shadow: 12px 12px 0px var(--strong-pink);
        }

        @keyframes avaFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* РОЛИ И КНОПКИ */
        .hero-subtitle {
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            color: var(--mauve-text);
            font-weight: 600;
        }

        .cta-container { display: flex; gap: 20px; }

        .enter-btn {
            text-decoration: none;
            color: var(--brown-outline);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            padding: 15px 40px;
            border: 3px solid var(--brown-outline);
            border-radius: 50px;
            background: white;
            box-shadow: 6px 6px 0px var(--soft-pink);
            transition: 0.3s;
            cursor: none !important;
        }

        .enter-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px var(--strong-pink);
        }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; overflow-y: auto; }
            .logo-main { max-width: 350px; }
            .ava-floating { width: 150px; height: 150px; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <main class="hero">
        <img src="font.png" alt="Astagme Logo" class="logo-main">
        
        <div class="ava-container">
            <img src="ava.png?v=5" alt="Astagme IMVU Avatar" class="ava-floating">
        </div>

        <div class="hero-subtitle">
            Illustrator • UI/UX Designer • Web Developer
        </div>

        <div class="cta-container">
            <a href="catalog.html" class="enter-btn">Portfolio</a>
            <a href="about.html" class="enter-btn">About Me</a>
        </div>
    </main>

    <script>
        window.addEventListener('load', () => { document.body.classList.add('fade-in'); });

        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 8 + 2;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `${x}px`;
            sparkle.style.top = `${y}px`;
            const destX = x + (Math.random() - 0.5) * 80;
            const destY = y + (Math.random() - 0.5) * 80;
            sparkle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(0)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => sparkle.remove(), 1000);
        }

        document.querySelectorAll('.enter-btn, .logo-main, .ava-floating').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.hostname === window.location.hostname && this.href.includes('.html')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = this.href; }, 500);
                }
            });
        });
    </script>
</body>
</html>
