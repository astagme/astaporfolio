<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --glow: rgba(255, 219, 234, 0.8);
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background: linear-gradient(135deg, #fdfbf7 0%, #fff5f8 100%);
        }

        /* Анимация парения */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh; /* Почти на весь экран */
            padding: 20px;
            text-align: center;
        }

        /* Огромное лого */
        .logo-text {
            width: 90%; 
            max-width: 1000px; 
            height: auto;
            filter: drop-shadow(0 15px 30px var(--glow));
            animation: float 6s ease-in-out infinite;
        }

        /* Аватарка под лого */
        .pfp-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 10px 30px var(--glow);
            object-fit: cover;
            margin-top: -40px; /* Наплыв на логотип для стиля */
            z-index: 2;
            background-color: white;
        }

        nav {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid white;
        }

        nav a {
            text-decoration: none;
            color: var(--mauve-text);
            margin: 0 20px;
            transition: 0.3s;
            font-weight: 500;
            font-size: 1.1rem;
        }

        nav a:hover { 
            color: #ff9ec7; 
            text-shadow: 0 0 10px var(--soft-pink); 
        }

        .hero-section h1 {
            color: var(--mauve-text);
            font-weight: 300;
            font-size: 1.6rem;
            margin-top: 40px;
            letter-spacing: 1px;
        }

        .section-container {
            padding: 80px 20px;
            text-align: center;
        }

    </style>
</head>
<body>

    <header>
        <img src="font.png" alt="astagme" class="logo-text">
        <img src="ava.png" alt="Asta" class="pfp-circle">

        <nav>
            <a href="#">home</a>
            <a href="#">branding</a>
            <a href="#">art</a>
            <a href="#">info</a>
        </nav>

        <div class="hero-section">
            <h1>i create brands people fall in love with</h1>
        </div>
    </header>

</body>
</html>
