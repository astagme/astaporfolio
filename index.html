<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --star-yellow: #FFD700;
            --glow: rgba(255, 219, 234, 0.8);
        }

        /* --- КАСТОМНЫЙ КУРСОР "ЗВЁЗДОЧКА С КОНТУРОМ" --- */
        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            cursor: none; /* Прячем стандартную стрелку */
            min-height: 180vh;
            overflow-x: hidden;
            position: relative;
        }

        #custom-cursor {
            position: fixed;
            width: 35px;
            height: 35px;
            background: var(--star-yellow);
            /* Форма звезды */
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            /* Розовый контур */
            border: 3px solid var(--strong-pink); 
            box-sizing: border-box;
            pointer-events: none; /* Чтобы клики проходили сквозь неё */
            z-index: 10000;
            opacity: 1;
            transform: translate(-50%, -50%); /* Центрируем по кончику мышки */
            transition: transform 0.05s linear, width 0.2s, height 0.2s, opacity 0.2s;
            filter: drop-shadow(0 5px 10px rgba(244, 194, 215, 0.3));
        }

        /* Эффект при наведении на кнопки */
        #custom-cursor.active {
            width: 45px;
            height: 45px;
            background: #FFE080; /* Чуть светлее жёлтый */
            border-color: #FFB3D1; /* Чуть ярче розовый */
            opacity: 0.9;
        }

        /* --- ОСТАЛЬНЫЕ СТИЛИ --- */
        .star-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: var(--star-yellow);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle var(--duration) infinite ease-in-out;
            opacity: 0.5;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.3; }
            50% { transform: scale(1.2) rotate(10deg); opacity: 0.7; }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 10px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .pfp-png { width: 320px; filter: drop-shadow(0 15px 30px var(--glow)); }
        .logo-text { width: 70%; max-width: 800px; filter: drop-shadow(0 20px 40px var(--glow)); }

        nav { margin-top: 60px; display: flex; gap: 20px; }

        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            padding: 15px 35px;
            border-radius: 50px;
            border: 2px solid var(--strong-pink);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            transition: 0.3s;
            cursor: none; /* Убираем курсор и на кнопках */
        }

        .nav-btn:hover {
            background: var(--soft-pink);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px var(--glow);
        }

        @media (max-width: 768px) {
            .brand-container { flex-direction: column; }
            body { cursor: auto; } /* На мобилках возвращаем обычный режим */
            #custom-cursor { display: none; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <div class="star-field">
        </div>

    <header>
        <div class="brand-container">
            <img src="ava.png" alt="Asta" class="pfp-png">
            <img src="font.png" alt="astagme" class="logo-text">
        </div>
        
        <nav>
            <a href="index.html" class="nav-btn">home</a>
            <a href="branding.html" class="nav-btn">branding</a>
            <a href="art.html" class="nav-btn">art</a>
            <a href="info.html" class="nav-btn">info</a>
        </nav>
    </header>

    <script>
        // Скрипт для движения курсора-звездочки за мышкой
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Добавляем класс при наведении на кнопки (чтобы звезда росла)
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(btn => {
            btn.addEventListener('mouseenter', () => cursor.classList.add('active'));
            btn.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });

        // Скрипт для генерации множества звезд в случайных местах
        const field = document.querySelector('.star-field');
        for (let i = 0; i < 20; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 20 + 10 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            field.appendChild(star);
        }
    </script>
</body>
</html>
