<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #63414C;
            --bg-cream: #FDFBF7;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important; /* Важно для кастомного курсора */
            color: var(--mauve-text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            animation: fadeInPage 0.8s ease-in-out;
        }

        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: linear-gradient(45deg, #fdfbf7, #ffdeeb, #fdfbf7, #e8d5ff);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #stars-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            pointer-events: none;
        }

        /* КУРСОР КАК НА ДРУГИХ СТРАНИЦАХ */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--mauve-text);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            transition: transform 0.15s ease-out;
        }

        /* ПЫЛЬ КАК НА ДРУГИХ СТРАНИЦАХ */
        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 6px var(--soft-pink);
        }

        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .logo-main {
            max-width: 680px;
            width: 95%;
            margin-bottom: 15px;
            filter: drop-shadow(0 15px 30px rgba(244, 194, 215, 0.4));
            animation: logoBreath 12s infinite ease-in-out;
        }

        @keyframes logoBreath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03) translateY(-5px); }
        }

        .subtitle-wrapper {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 45px;
            padding: 12px 35px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            border: 2px solid var(--mauve-text);
            box-shadow: 6px 6px 0px var(--soft-pink);
        }

        .hero-subtitle {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--mauve-text);
            margin: 0;
        }

        .skill-bow {
            height: 45px;
            animation: bowFloat 4s infinite ease-in-out;
        }

        @keyframes bowFloat {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg) scale(1.1); }
        }

        /* ВОЗДУШНАЯ АНИМАЦИЯ АВАТАРА */
        .ava-box {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid var(--mauve-text);
            background: white;
            box-shadow: 0 0 0 8px white, 0 0 0 12px var(--soft-pink);
            overflow: hidden;
            margin-bottom: 45px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .ava-box img { width: 100%; height: 100%; object-fit: cover; }

        .ava-box:hover {
            transform: translateY(-15px) scale(1.05) rotate(3deg);
            box-shadow: 0 0 0 8px white, 0 20px 40px rgba(166, 112, 129, 0.2);
        }

        .cta-group { display: flex; gap: 25px; }
        .enter-btn {
            text-decoration: none;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            padding: 16px 45px;
            border: 3px solid var(--mauve-text);
            border-radius: 50px;
            background: white;
            box-shadow: 6px 6px 0px var(--soft-pink);
            transition: 0.3s ease;
            cursor: none !important;
        }

        .enter-btn:hover {
            transform: translateY(-4px);
            box-shadow: 10px 10px 0px var(--strong-pink);
        }

        /* Скрываем кастомный курсор на мобильных */
        @media (max-width: 768px) {
            #custom-cursor { display: none; }
            body { cursor: auto !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="bg-gradient"></div>
    <canvas id="stars-canvas"></canvas>

    <main class="hero-container">
        <img src="font.png" alt="Astagme" class="logo-main">

        <div class="subtitle-wrapper">
            <img src="bow.png" alt="" class="skill-bow">
            <p class="hero-subtitle">Illustrator • UI/UX Designer • Web Developer</p>
            <img src="bow.png" alt="" class="skill-bow">
        </div>

        <div class="ava-box">
            <img src="ava.png" alt="Astagme Avatar">
        </div>

        <div class="cta-group">
            <a href="catalog.html" class="enter-btn">Portfolio</a>
            <a href="about.html" class="enter-btn">About Me</a>
        </div>
    </main>

    <script>
        // Звезды на фоне
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.opacity = Math.random();
                this.speed = Math.random() * 0.02;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                this.opacity += this.speed;
                if (this.opacity > 1 || this.opacity < 0) this.speed = -this.speed;
            }
        }
        for (let i = 0; i < 150; i++) stars.push(new Star());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => { star.update(); star.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // ЛОГИКА КУРСОР И ПЫЛИ (КОПИЯ С ДРУГИХ СТРАНИЦ)
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Частота появления пыли (0.7 — золотая середина)
            if (Math.random() > 0.7) {
                createSparkle(e.clientX, e.clientY);
            }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            
            // Размер как в оригинальном коде
            const size = Math.random() * 5 + 2; 
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            
            sparkle.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*60}px, ${(Math.random()-0.5)*60}px) scale(0)`, opacity: 0 }
            ], { duration: 800, easing: 'ease-out' });
            
            setTimeout(() => sparkle.remove(), 800);
        }

        // Взаимодействие курсора
        document.querySelectorAll('.enter-btn, .logo-main, .ava-box, .subtitle-wrapper').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1.4)';
                cursor.style.background = 'var(--soft-pink)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1)';
                cursor.style.background = 'white';
            });
        });
    </script>
</body>
</html>
