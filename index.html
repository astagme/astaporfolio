<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Creative Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        /* --- ПЛАВНОСТЬ ЗАГРУЗКИ --- */
        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            opacity: 0; 
            transition: opacity 0.8s ease-out;
            cursor: none !important;
            color: var(--mauve-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* На главной уберем скролл для чистоты */
        }

        body.fade-in { opacity: 1; }

        /* --- ЕДИНЫЙ КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s, width 0.2s, height 0.2s;
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.6) !important;
            background: var(--soft-pink) !important;
        }

        /* --- ИСКОРКИ --- */
        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
            box-shadow: 0 0 10px var(--soft-pink);
        }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .logo-main {
            max-width: 350px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 15px rgba(244, 194, 215, 0.4));
            transition: 0.5s ease;
            cursor: none !important;
        }

        .logo-main:hover {
            transform: scale(1.05) rotate(2deg);
            filter: drop-shadow(0 15px 25px rgba(244, 194, 215, 0.8));
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 40px;
            opacity: 0.7;
        }

        /* --- КНОПКИ ВХОДА --- */
        .cta-container {
            display: flex;
            gap: 20px;
        }

        .enter-btn {
            text-decoration: none;
            color: var(--brown-outline);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 15px 40px;
            border: 3px solid var(--brown-outline);
            border-radius: 50px;
            background: white;
            box-shadow: 8px 8px 0px var(--soft-pink);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important;
        }

        .enter-btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 12px 12px 0px var(--strong-pink);
            background: var(--bg-cream);
        }

        /* --- АНИМИРОВАННЫЙ ДЕКОР --- */
        .floating-shape {
            position: absolute;
            background: var(--soft-pink);
            opacity: 0.3;
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
            animation: float 10s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; overflow-y: auto; }
            .enter-btn, .logo-main { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div class="floating-shape" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
    <div class="floating-shape" style="width: 250px; height: 250px; bottom: -50px; right: -50px; background: #F4C2D7;"></div>

    <div id="custom-cursor"></div>

    <main class="hero">
        <img src="font.png" alt="Astagme Logo" class="logo-main">
        
        <h1>Digital Artist & Designer</h1>

        <div class="cta-container">
            <a href="catalog.html" class="enter-btn">Portfolio</a>
            <a href="about.html" class="enter-btn">About Me</a>
        </div>
    </main>

    <script>
        // Плавное появление
        window.addEventListener('load', () => { document.body.classList.add('fade-in'); });

        // Курсор и искры
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 8 + 2;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `${x}px`;
            sparkle.style.top = `${y}px`;
            const destX = x + (Math.random() - 0.5) * 80;
            const destY = y + (Math.random() - 0.5) * 80;
            sparkle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(0)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => sparkle.remove(), 1000);
        }

        // Реакция на кнопки и лого
        const refresh = () => {
            document.querySelectorAll('.enter-btn, .logo-main, a').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
            });
        };
        refresh();

        // Переход между страницами
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.hostname === window.location.hostname && this.href.includes('.html')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = this.href; }, 500);
                }
            });
        });
    </script>
</body>
</html>
