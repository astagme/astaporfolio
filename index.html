<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --glow: rgba(255, 219, 234, 0.8);
        }

        body {
            background: linear-gradient(135deg, #fdfbf7 0%, #fff5f8 100%);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 180vh;
            overflow-x: hidden;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Контейнер для аватарки и логотипа - УВЕЛИЧИЛИ РАЗМЕР */
        .brand-container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            gap: 10px; /* Сделали ЕЩЕ ближе */
            width: 100%;
            max-width: 1300px; /* Увеличили максимальную ширину */
            animation: float 6s ease-in-out infinite;
        }

        /* УВЕЛИЧИЛИ АВАТАРКУ */
        .pfp-png {
            width: 320px; /* Было 250px */
            height: auto;
            filter: drop-shadow(0 15px 30px var(--glow));
        }

        /* УВЕЛИЧИЛИ ЛОГОТИП */
        .logo-text {
            width: 70%; /* Было 60% */
            max-width: 800px; /* Было 600px */
            height: auto;
            filter: drop-shadow(0 20px 40px var(--glow));
        }

        /* Кнопки с розовым контуром */
        nav {
            margin-top: 60px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 35px;
            border-radius: 50px;
            border: 2px solid var(--strong-pink); 
            font-weight: 500;
            font-size: 1.2rem;
            transition: 0.3s all ease;
        }

        .nav-btn:hover {
            background: var(--soft-pink);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--glow);
        }

        /* Адаптация под мобильные */
        @media (max-width: 768px) {
            .brand-container { 
                flex-direction: column; 
                gap: 5px; 
            }
            .pfp-png { width: 220px; }
            .logo-text { width: 95%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand-container">
            <img src="ava.png" alt="Asta" class="pfp-png">
            <img src="font.png" alt="astagme" class="logo-text">
        </div>
        
        <nav>
            <a href="index.html" class="nav-btn">home</a>
            <a href="branding.html" class="nav-btn">branding</a>
            <a href="art.html" class="nav-btn">art</a>
            <a href="info.html" class="nav-btn">info</a>
        </nav>
    </header>
    <div style="height: 1000px;"></div>
</body>
</html>
