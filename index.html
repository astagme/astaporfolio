<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --glow: rgba(255, 219, 234, 0.8);
        }

        body {
            background: linear-gradient(135deg, #fdfbf7 0%, #fff5f8 100%);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 150vh; /* Сделали сайт длиннее */
            overflow-x: hidden;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Первый экран полностью под бренд */
            width: 100%;
            text-align: center;
        }

        .logo-text {
            width: 95%; 
            max-width: 1300px;
            height: auto;
            filter: drop-shadow(0 20px 40px var(--glow));
            animation: float 6s ease-in-out infinite;
            z-index: 2;
        }

        .pfp-png {
            width: 400px; /* Сделали ЕЩЕ крупнее */
            height: auto;
            margin-top: -140px; /* Прижимаем к логотипу */
            filter: drop-shadow(0 15px 30px var(--glow));
            z-index: 1;
        }

        /* --- КНОПКИ МЕНЮ --- */
        nav {
            margin-top: 60px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid white;
            font-weight: 500;
            font-size: 1.4rem;
            transition: 0.4s all ease;
            box-shadow: 0 10px 20px rgba(166, 112, 129, 0.05);
        }

        .nav-btn:hover {
            background: var(--soft-pink);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--glow);
        }

        .tagline {
            color: var(--mauve-text);
            font-size: 2.2rem;
            margin-top: 80px;
            font-weight: 300;
            letter-spacing: 2px;
            max-width: 800px;
        }

        /* --- СЕКЦИЯ КОНТЕНТА (чтобы сайт был длинным) --- */
        .content-section {
            padding: 100px 20px;
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }
    </style>
</head>
<body>
    <header>
        <img src="font.png" alt="astagme" class="logo-text">
        <img src="ava.png" alt="Asta" class="pfp-png">
        
        <nav>
            <a href="index.html" class="nav-btn">home</a>
            <a href="branding.html" class="nav-btn">branding</a>
            <a href="art.html" class="nav-btn">art</a>
            <a href="info.html" class="nav-btn">info</a>
        </nav>

        <h1 class="tagline">i create brands people fall in love with</h1>
    </header>

    <section class="content-section">
        <div style="height: 500px;"></div> 
    </section>
</body>
</html>
