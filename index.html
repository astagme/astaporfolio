<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ВОЗВРАЩАЕМ ТОТ САМЫЙ КУРСОР */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        /* ИСКРЫ ПРИ ДВИЖЕНИИ */
        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 10px var(--soft-pink);
        }

        /* КОНТЕНТ */
        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 5;
        }

        /* ЛОГОТИП: ТЕПЕРЬ ДЫШИТ, А НЕ ПРЫГАЕТ */
        .logo-main {
            max-width: 600px;
            width: 90%;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(244, 194, 215, 0.3));
            animation: logoBreathe 6s infinite ease-in-out;
            transition: 0.8s ease;
        }

        @keyframes logoBreathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.02); opacity: 1; }
        }

        .logo-main:hover {
            transform: scale(1.05) !important;
            filter: drop-shadow(0 15px 30px var(--soft-pink));
        }

        /* БОЛЬШАЯ АВАТАРКА */
        .ava-box {
            width: 200px;
            height: 200px;
            margin-bottom: 40px;
            border-radius: 50%;
            border: 4px solid var(--brown-outline);
            background: white;
            box-shadow: 10px 10px 0 var(--soft-pink);
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ava-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ava-box:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 15px 15px 0 var(--strong-pink);
        }

        /* КНОПКИ */
        .cta-container {
            display: flex;
            gap: 20px;
        }

        .main-btn {
            text-decoration: none;
            color: var(--brown-outline);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            padding: 15px 40px;
            border: 3px solid var(--brown-outline);
            border-radius: 50px;
            background: white;
            box-shadow: 6px 6px 0 var(--soft-pink);
            transition: 0.3s;
            cursor: none !important;
        }

        .main-btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 10px 10px 0 var(--strong-pink);
            background: var(--bg-cream);
        }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .logo-main { max-width: 350px; }
            .ava-box { width: 150px; height: 150px; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div class="hero-content">
        <img src="font.png" alt="Astagme" class="logo-main">

        <div class="ava-box">
            <img src="ava.png" alt="Astagme Avatar">
        </div>

        <div class="cta-container">
            <a href="catalog.html" class="main-btn">Portfolio</a>
            <a href="about.html" class="main-btn">About Me</a>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');

        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 6 + 2;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `${x}px`;
            sparkle.style.top = `${y}px`;
            
            const destX = x + (Math.random() - 0.5) * 100;
            const destY = y + (Math.random() - 0.5) * 100;
            
            sparkle.animate([
                { transform: 'scale(1)', opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(0)`, opacity: 0 }
            ], { duration: 800, easing: 'ease-out', fill: 'forwards' });
            
            setTimeout(() => sparkle.remove(), 800);
        }

        document.querySelectorAll('.main-btn, .logo-main, .ava-box').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });
    </script>
</body>
</html>
