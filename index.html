<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Magical Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #63414C;
            --bg-cream: #FDFBF7;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            animation: fadeInPage 0.8s ease-in-out;
        }

        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- ОБНОВЛЕННЫЙ ЖИВОЙ ФОН --- */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -3;
            /* Более глубокий градиент */
            background: linear-gradient(135deg, #fdfbf7, #ffdeeb, #fdfbf7, #e8d5ff, #fdfbf7);
            background-size: 500% 500%;
            animation: gradientMove 20s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Слои для мерцающих звезд */
        #stars-canvas, #dust-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            pointer-events: none;
        }

        #dust-canvas { z-index: -1; opacity: 0.5; } /* Розовая пыль чуть ближе */

        /* КУРСОР */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--mauve-text);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            transition: transform 0.15s ease-out;
            will-change: transform;
        }

        /* ПЫЛЬ КУРСОРА */
        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 6px var(--soft-pink), 0 0 10px white;
        }

        /* КОНТЕНТ */
        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .logo-main {
            max-width: 680px;
            width: 95%;
            margin-bottom: 15px;
            filter: drop-shadow(0 15px 30px rgba(244, 194, 215, 0.4));
            animation: logoBreath 12s infinite ease-in-out;
            will-change: transform;
        }

        @keyframes logoBreath {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.02) translateY(-5px); }
        }

        .subtitle-wrapper {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 45px;
            padding: 12px 35px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid var(--mauve-text);
            box-shadow: 6px 6px 0px var(--soft-pink);
        }

        .hero-subtitle {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--mauve-text);
            margin: 0;
        }

        .skill-bow {
            height: 45px;
            filter: drop-shadow(2px 2px 0px var(--soft-pink));
            animation: bowFloat 4s infinite ease-in-out;
        }

        @keyframes bowFloat {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        /* АВАТАР */
        .ava-box {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid var(--mauve-text);
            background: white;
            box-shadow: 0 0 0 8px white, 0 0 0 12px var(--soft-pink);
            overflow: hidden;
            margin-bottom: 45px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }
        .ava-box img { width: 100%; height: 100%; object-fit: cover; }
        .ava-box:hover {
            transform: translateY(-15px) scale(1.05) rotate(3deg);
            box-shadow: 0 0 0 8px white, 0 20px 40px rgba(166, 112, 129, 0.2);
        }

        /* КНОПКИ */
        .cta-group { display: flex; gap: 25px; }
        .enter-btn {
            text-decoration: none;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            padding: 16px 45px;
            border: 3px solid var(--mauve-text);
            border-radius: 50px;
            background: white;
            box-shadow: 6px 6px 0px var(--soft-pink);
            transition: 0.3s ease;
            cursor: none !important;
        }
        .enter-btn:hover {
            transform: translateY(-4px);
            box-shadow: 10px 10px 0px var(--strong-pink);
        }

        @media (max-width: 768px) {
            #custom-cursor { display: none; }
            body { cursor: auto !important; }
            .logo-main { max-width: 400px; }
            .ava-box { width: 150px; height: 150px; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="bg-gradient"></div>
    <canvas id="stars-canvas"></canvas>
    <canvas id="dust-canvas"></canvas>

    <main class="hero-container">
        <img src="font.png" alt="Astagme" class="logo-main">

        <div class="subtitle-wrapper">
            <img src="bow.png" alt="" class="skill-bow">
            <p class="hero-subtitle">Illustrator • UI/UX Designer • Web Developer</p>
            <img src="bow.png" alt="" class="skill-bow">
        </div>

        <div class="ava-box">
            <img src="ava.png" alt="Astagme Avatar">
        </div>

        <div class="cta-group">
            <a href="catalog.html" class="enter-btn">Portfolio</a>
            <a href="about.html" class="enter-btn">About Me</a>
        </div>
    </main>

    <script>
        // --- ОБНОВЛЕННАЯ ЛОГИКА ФОНА (МЕРЦАНИЕ И ГЛУБИНА) ---
        const sCanvas = document.getElementById('stars-canvas');
        const sCtx = sCanvas.getContext('2d');
        const dCanvas = document.getElementById('dust-canvas');
        const dCtx = dCanvas.getContext('2d');
        
        let stars = [];
        let dust = [];
        let mouseX = 0, mouseY = 0;

        function resize() {
            sCanvas.width = dCanvas.width = window.innerWidth;
            sCanvas.height = dCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        class Particle {
            constructor(color, isStar) {
                this.x = Math.random() * sCanvas.width;
                this.y = Math.random() * sCanvas.height;
                this.size = Math.random() * (isStar ? 2.5 : 1.5) + 0.5;
                this.color = color;
                this.opacity = Math.random();
                this.fadeSpeed = Math.random() * 0.015 + 0.005;
                this.isStar = isStar;
                // Коэффициент параллакса (глубина)
                this.depth = Math.random() * 0.05 + (isStar ? 0.02 : 0.01); 
            }
            draw(ctx) {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1; // Сброс
            }
            update() {
                // Плавное мерцание
                this.opacity += this.fadeSpeed;
                if (this.opacity > 1 || this.opacity < 0.1) this.fadeSpeed = -this.fadeSpeed;

                // Легкий параллакс от мыши
                const moveX = (window.innerWidth / 2 - mouseX) * this.depth;
                const moveY = (window.innerHeight / 2 - mouseY) * this.depth;
                
                // Рендерим с учетом смещения
                this.renderX = this.x + moveX;
                this.renderY = this.y + moveY;
            }
        }

        // Создаем белые звезды
        for (let i = 0; i < 120; i++) stars.push(new Particle('white', true));
        // Создаем розовую пыль
        for (let i = 0; i < 60; i++) dust.push(new Particle('#FFDBEA', false));

        function animate() {
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);

            // Отрисовка пыли (на нижнем холсте)
            dust.forEach(p => {
                p.update();
                // Рисуем с учетом параллакса
                dCtx.globalAlpha = p.opacity;
                dCtx.fillStyle = p.color;
                dCtx.beginPath();
                dCtx.arc(p.renderX, p.renderY, p.size, 0, Math.PI * 2);
                dCtx.fill();
            });

            // Отрисовка звезд (на верхнем холсте)
            stars.forEach(p => {
                p.update();
                // Рисуем с учетом параллакса
                sCtx.globalAlpha = p.opacity;
                sCtx.fillStyle = p.color;
                sCtx.beginPath();
                sCtx.arc(p.renderX, p.renderY, p.size, 0, Math.PI * 2);
                sCtx.fill();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // --- ЛОГИКА КУРСОР И ПЫЛИ (БЕЗ ИЗМЕНЕНИЙ) ---
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if (Math.random() > 0.7) {
                createSparkle(e.clientX, e.clientY);
            }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 5 + 2; 
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            
            sparkle.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*60}px, ${(Math.random()-0.5)*60}px) scale(0)`, opacity: 0 }
            ], { duration: 800, easing: 'ease-out' });
            
            setTimeout(() => sparkle.remove(), 800);
        }

        document.querySelectorAll('.enter-btn, .logo-main, .ava-box, .subtitle-wrapper').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1.4)';
                cursor.style.background = 'var(--soft-pink)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1)';
                cursor.style.background = 'white';
            });
        });
    </script>
</body>
</html>
