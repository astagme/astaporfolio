<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Creative Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* МАГИЧЕСКИЙ КУРСОР */
        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 50% 50% 50% 2px;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s;
        }

        /* СЕТКА ИНТЕРФЕЙСА */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
        }

        /* ЛОГОТИП С ЭФФЕКТОМ СИЯНИЯ */
        .logo-section {
            position: relative;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .logo-main {
            max-width: 550px;
            width: 90%;
            height: auto;
            /* Анимация внутреннего свечения */
            animation: logoGlow 4s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(244, 194, 215, 0.3));
        }

        @keyframes logoGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(244, 194, 215, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 35px rgba(244, 194, 215, 0.8)); transform: scale(1.02); }
        }

        /* КАРТОЧКА С АВАТАРКОЙ (ПАРАЛЛАКС) */
        .info-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 3px solid white;
            border-radius: 40px;
            padding: 30px 60px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 15px 35px rgba(244, 194, 215, 0.2);
            /* Убираем авто-левитацию, заменяем на плавность для JS */
            transition: transform 0.2s ease-out; 
        }

        .ava-mini {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--brown-outline);
            object-fit: cover;
            background: white;
            box-shadow: 5px 5px 0 var(--soft-pink);
        }

        .text-group { text-align: left; }

        .role-tag {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.7;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .action-btn {
            text-decoration: none;
            color: var(--brown-outline);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            padding: 10px 25px;
            border: 2px solid var(--brown-outline);
            border-radius: 30px;
            background: white;
            transition: 0.3s;
            cursor: none !important;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            background: var(--soft-pink);
            transform: translateY(-3px);
            box-shadow: 4px 4px 0 var(--strong-pink);
        }

        /* ДЕКОРАТИВНЫЕ БЛИКИ */
        .light-orb {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--soft-pink) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
        }

        @media (max-width: 850px) {
            .info-panel { flex-direction: column; padding: 30px; text-align: center; }
            .text-group { text-align: center; }
            #custom-cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="light-orb" style="top: -10%; left: -10%;"></div>
    <div class="light-orb" style="bottom: -10%; right: -10%;"></div>

    <div class="wrapper">
        <div class="logo-section" id="logoGroup">
            <img src="font.png" alt="Astagme" class="logo-main">
        </div>

        <div class="info-panel" id="parallaxCard">
            <img src="ava.png" alt="Astagme" class="ava-mini">
            <div class="text-group">
                <div class="role-tag">Digital Artist & Designer</div>
                <div class="btn-group">
                    <a href="catalog.html" class="action-btn">Portfolio</a>
                    <a href="about.html" class="action-btn">About Me</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const card = document.getElementById('parallaxCard');
        const logo = document.getElementById('logoGroup');

        window.addEventListener('mousemove', (e) => {
            // Движение курсора
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            // Параллакс эффект
            const x = (window.innerWidth / 2 - e.clientX) / 25;
            const y = (window.innerHeight / 2 - e.clientY) / 25;

            card.style.transform = `translate(${-x}px, ${-y}px)`;
            logo.style.transform = `translate(${x*0.5}px, ${y*0.5}px)`;
        });

        // Эффект на кнопках
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('mouseenter', () => cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1.5)');
            btn.addEventListener('mouseleave', () => cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1)');
        });
    </script>
</body>
</html>
