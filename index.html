<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; /* Для контура кнопок */
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --glow: rgba(255, 219, 234, 0.8);
        }

        body {
            background: linear-gradient(135deg, #fdfbf7 0%, #fff5f8 100%);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 180vh; /* Еще длиннее для скролла */
            overflow-x: hidden;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            text-align: center;
            padding-top: 50px;
        }

        /* Контейнер для аватарки и логотипа в одну линию */
        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px; /* Расстояние между авой и текстом */
            width: 90%;
            max-width: 1200px;
            animation: float 6s ease-in-out infinite;
        }

        .logo-text {
            width: 65%; /* Уменьшили надпись */
            max-width: 700px;
            height: auto;
            filter: drop-shadow(0 15px 30px var(--glow));
        }

        .pfp-png {
            width: 250px; /* Крупная, но соразмерная тексту */
            height: auto;
            filter: drop-shadow(0 10px 20px var(--glow));
        }

        /* --- КНОПКИ С РОЗОВЫМ КОНТУРОМ --- */
        nav {
            margin-top: 80px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            background: rgba(255, 255, 255, 0.5);
            padding: 18px 45px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            /* Розовый контур */
            border: 2px solid var(--strong-pink); 
            font-weight: 500;
            font-size: 1.4rem;
            transition: 0.4s all cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(244, 194, 215, 0.2);
        }

        .nav-btn:hover {
            background: var(--soft-pink);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 15px 30px var(--glow);
            border-color: transparent;
        }

        .tagline {
            color: var(--mauve-text);
            font-size: 2.2rem;
            margin-top: 100px;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .spacer { height: 800px; } /* Место для будущего контента */

    </style>
</head>
<body>
    <header>
        <div class="brand-container">
            <img src="ava.png" alt="Asta" class="pfp-png">
            <img src="font.png" alt="astagme" class="logo-text">
        </div>
        
        <nav>
            <a href="index.html" class="nav-btn">home</a>
            <a href="branding.html" class="nav-btn">branding</a>
            <a href="art.html" class="nav-btn">art</a>
            <a href="info.html" class="nav-btn">info</a>
        </nav>

        <h1 class="tagline">i create brands people fall in love with</h1>
    </header>

    <div class="spacer"></div>
</body>
</html>
