<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Magical Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #63414C;
            --bg-cream: #FDFBF7;
            --angel-blue: #E3F2FD;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ЖИВОЙ ГРАДИЕНТНЫЙ ФОН */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(45deg, #fdfbf7, #ffdeeb, #fdfbf7, #e8d5ff);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ЗВЕЗДНОЕ НЕБО (Холст для JS) */
        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* КУРСОР-РОМБИК */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--mauve-text);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.6) !important;
            background: var(--soft-pink) !important;
        }

        /* КОНТЕНТ */
        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        /* ЛОГОТИП СТАЛ КРУПНЕЕ И ЕЩЕ ЧЁТЧЕ */
        .logo-main {
            /* УВЕЛИЧИЛИ РАЗМЕР: теперь до 680px */
            max-width: 680px; 
            width: 95%; /* Чуть больше заполняет экран */
            margin-bottom: 5px;
            filter: drop-shadow(0 15px 25px rgba(244, 194, 215, 0.6));
            
            /* Гипер-плавность */
            transition: all 1.5s cubic-bezier(0.25, 0.1, 0.25, 1);
            animation: logoBreath 12s infinite ease-in-out; /* Сделали ещё медленнее и плавнее */
            
            /* ФИКС КАЧЕСТВА ПРИ АНИМАЦИИ */
            will-change: transform, filter;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0); /* Аппаратное ускорение */
        }

        @keyframes logoBreath {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.025) translateY(-5px); opacity: 1; }
        }

        .logo-main:hover {
            transform: scale(1.06) translateY(-8px) !important; /* Очень мягкое увеличение */
            filter: drop-shadow(0 0 35px var(--soft-pink));
        }

        /* НАДПИСЬ С БАНТИКАМИ */
        .hero-subtitle {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 15px; /* Отступ между бантиками и текстом */
            opacity: 0.8;
        }

        /* Стили для твоих бантиков (bow.png) */
        .hero-subtitle .skill-bow {
            height: 25px; /* Задаем аккуратный размер бантикам */
            width: auto;
            filter: drop-shadow(2px 2px 0 var(--soft-pink)); /* Легкая тень для объема */
        }

        /* АВАТАРКА */
        .ava-box {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            border: 4px solid var(--mauve-text);
            background: white;
            box-shadow: 0 0 0 8px white, 0 0 0 12px var(--soft-pink);
            overflow: hidden;
            margin-bottom: 40px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ava-box img { width: 100%; height: 100%; object-fit: cover; }
        .ava-box:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 0 0 10px white, 0 0 40px var(--strong-pink); }

        /* КНОПКИ */
        .cta-group { display: flex; gap: 25px; }

        .enter-btn {
            text-decoration: none;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            padding: 16px 45px;
            border: 3px solid var(--mauve-text);
            border-radius: 50px;
            background: white;
            box-shadow: 6px 6px 0px var(--soft-pink);
            transition: 0.3s;
            cursor: none !important;
        }

        .enter-btn:hover {
            transform: translateY(-4px);
            box-shadow: 10px 10px 0px var(--strong-pink);
            background: #fff;
        }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .logo-main { max-width: 380px; }
            .hero-subtitle { font-size: 0.7rem; gap: 8px; flex-wrap: wrap; justify-content: center;}
            .hero-subtitle .skill-bow { height: 18px; }
            .ava-box { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="bg-gradient"></div>
    <canvas id="stars-canvas"></canvas>

    <main class="hero-container">
        <img src="font.png" alt="Astagme" class="logo-main">

        <div class="hero-subtitle">
            <img src="bow.png" alt="" class="skill-bow">
            Illustrator • UI/UX Designer • Web Developer
            <img src="bow.png" alt="" class="skill-bow">
        </div>

        <div class="ava-box">
            <img src="ava.png" alt="Astagme Avatar">
        </div>

        <div class="cta-group">
            <a href="catalog.html" class="enter-btn">Portfolio</a>
            <a href="about.html" class="enter-btn">About Me</a>
        </div>
    </main>

    <script>
        // Скрипт для мерцающих звезд
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.opacity = Math.random();
                this.speed = Math.random() * 0.02;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.opacity += this.speed;
                if (this.opacity > 1 || this.opacity < 0) this.speed = -this.speed;
            }
        }

        for (let i = 0; i < 150; i++) stars.push(new Star());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Управление курсором
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('.enter-btn, .logo-main, .ava-box').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });
    </script>
</body>
</html>
