<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            
            /* --- НАСТРОЙКИ ПЛАВНОСТИ --- */
            opacity: 0; 
            transition: opacity 0.8s ease-in-out;
        }

        /* Класс для проявления */
        body.visible { 
            opacity: 1 !important; 
        }

        /* --- КУРСОР И ПЫЛЬ --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s;
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
            box-shadow: 0 0 10px var(--soft-pink);
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            z-index: 100;
        }
        
        .nav-btn { 
            text-decoration: none; 
            color: var(--brown-outline); 
            font-weight: 700; 
            font-size: 0.95rem;
            padding: 12px 28px; 
            border: 2px solid var(--brown-outline); 
            border-radius: 50px; 
            background: white; 
            box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important; 
        }

        .nav-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 7px 7px 0px var(--strong-pink);
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 3rem;
            color: var(--brown-outline);
            margin: 10px 0 60px;
            text-align: center;
        }

        /* --- КАРТОЧКИ --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 100px;
        }

        .category-card {
            text-decoration: none;
            color: var(--brown-outline);
            background: white;
            border: 3px solid var(--brown-outline);
            border-radius: 25px;
            padding: 50px 25px;
            text-align: center;
            box-shadow: 12px 12px 0px var(--soft-pink);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .category-card:hover {
            transform: translate(6px, 6px);
            box-shadow: 4px 4px 0px var(--brown-outline);
            background-color: var(--soft-pink);
        }

        .card-icon-img {
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        .category-card:hover .card-icon-img {
            transform: scale(1.1) rotate(-5deg);
        }

        .card-title { font-family: 'Comfortaa'; font-size: 1.7rem; font-weight: 700; }
        .card-desc { font-family: 'Quicksand'; font-size: 1rem; line-height: 1.5; opacity: 0.9; }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn, .category-card { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="about.html" class="nav-btn">About me</a>
    </nav>

    <h1>Creative Portfolio</h1>

    <main class="catalog-grid">
        <a href="websites.html" class="category-card">
            <img src="catalog/web.png" alt="Web Design" class="card-icon-img">
            <div class="card-title">Websites</div>
            <p class="card-desc">Custom landing pages & creative web designs</p>
        </a>

        <a href="logos.html" class="category-card">
            <img src="catalog/logos.png" alt="Logo Design" class="card-icon-img">
            <div class="card-title">Logos</div>
            <p class="card-desc">Custom logos with a unique creative touch</p>
        </a>

        <a href="art.html" class="category-card">
            <img src="catalog/digital.png" alt="Digital Art" class="card-icon-img">
            <div class="card-title">Digital Art</div>
            <p class="card-desc">Hand-drawn illustrations and social media art</p>
        </a>
    </main>

    <script>
        // ИСПРАВЛЕННАЯ ФУНКЦИЯ ПРОЯВЛЕНИЯ
        document.addEventListener('DOMContentLoaded', () => {
            // Небольшая задержка, чтобы браузер успел применить стили opacity: 0
            setTimeout(() => {
                document.body.classList.add('visible');
            }, 50);
        });

        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 8 + 2;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `${x}px`;
            sparkle.style.top = `${y}px`;
            const destX = x + (Math.random() - 0.5) * 80;
            const destY = y + (Math.random() - 0.5) * 80;
            sparkle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(0)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => sparkle.remove(), 1000);
        }

        document.querySelectorAll('a, .category-card').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });

        // ПЛАВНЫЙ УХОД ПРИ ПЕРЕХОДЕ
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                // Проверяем, что ссылка ведет на внутреннюю страницу .html
                if (href && href.includes('.html') && !href.startsWith('http')) {
                    e.preventDefault();
                    document.body.classList.remove('visible');
                    // Ждем завершения анимации (0.6s) и переходим
                    setTimeout(() => { 
                        window.location.href = href; 
                    }, 600);
                }
            });
        });
    </script>
</body>
</html>
