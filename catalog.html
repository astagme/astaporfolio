<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        /* ПЛАВНОСТЬ */
        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            opacity: 0; 
            transition: opacity 0.5s ease;
            cursor: none !important;
            color: var(--mauve-text);
            min-height: 100vh;
        }

        body.fade-in {
            opacity: 1;
        }

        /* КУРСОР */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: rotate(-45deg) translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
        }

        .cursor-active {
            transform: rotate(-45deg) translate(-50%, -50%) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        nav {
            padding: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid var(--strong-pink);
            background: white;
            transition: 0.3s;
            cursor: none !important;
        }

        .nav-btn:hover {
            background: var(--soft-pink);
            color: white;
            transform: translateY(-3px);
        }

        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 40px 80px;
            text-align: center;
        }

        .catalog-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 3rem;
            margin-bottom: 50px;
            color: #5D3D48;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .category-card {
            background: white;
            border: 3px solid var(--brown-outline);
            border-radius: 40px;
            padding: 50px 30px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 10px 10px 0px var(--soft-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: none !important;
        }

        .category-card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 15px 15px 0px var(--strong-pink);
        }

        .category-icon { font-size: 60px; margin-bottom: 20px; }
        .category-card h3 { font-family: 'Quicksand', sans-serif; font-size: 1.8rem; margin: 10px 0; color: #5D3D48; }
        .category-card p { margin: 0; color: var(--mauve-text); }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn, .category-card { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="about.html" class="nav-btn">About Me</a>
    </nav>

    <main class="catalog-container">
        <h1 class="catalog-title">Portfolio</h1>
        <div class="catalog-grid">
            <a href="logos.html" class="category-card">
                <div class="category-icon">🎨</div>
                <h3>Logos</h3>
                <p>Branding & visual identity</p>
            </a>
            <a href="art.html" class="category-card">
                <div class="category-icon">✨</div>
                <h3>Illustrations</h3>
                <p>Digital art & character design</p>
            </a>
            <a href="branding.html" class="category-card">
                <div class="category-icon">💻</div>
                <h3>Websites</h3>
                <p>UI/UX & creative coding</p>
            </a>
        </div>
    </main>

    <script>
        // Проявление при загрузке
        window.addEventListener('load', () => {
            document.body.classList.add('fade-in');
        });

        // Плавный уход при клике
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.hostname === window.location.hostname && this.href.includes('.html')) {
                    e.preventDefault();
                    const target = this.href;
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = target; }, 500);
                }
            });
        });

        // Курсор
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactables = document.querySelectorAll('.nav-btn, .category-card');
        interactables.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });
    </script>
</body>
</html>
