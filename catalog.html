<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #63414C;
            --bg-cream: #FDFBF7;
        }

        /* Плавное появление страницы как в index.html */
        @keyframes fadeInPage {
            from { opacity: 0; filter: blur(10px); transform: translateY(10px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            animation: fadeInPage 1.2s ease-out forwards;
        }

        /* --- ФОН И ГРАДИЕНТ --- */
        .bg-gradient { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; 
            background: linear-gradient(135deg, #fdfbf7, #ffdeeb, #fdfbf7, #e8d5ff, #fdfbf7); 
            background-size: 500% 500%; animation: gradientMove 20s ease infinite; 
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        
        /* КУРСОР ИЗ INDEX */
        #custom-cursor { 
            position: fixed; width: 25px; height: 25px; background: white; border: 2px solid var(--mauve-text); 
            border-radius: 2px 50% 50% 50%; transform: translate(-50%, -50%) rotate(-45deg); 
            pointer-events: none; z-index: 10000; box-shadow: 2px 2px 0px var(--soft-pink); 
        }
        
        .sparkle { position: fixed; background: var(--strong-pink); border-radius: 50%; pointer-events: none; z-index: 9999; }

        /* --- НАВИГАЦИЯ --- */
        .nav-header { width: 100%; padding: 30px; box-sizing: border-box; display: flex; justify-content: flex-start; }
        
        .back-btn { 
            text-decoration: none; color: var(--mauve-text); font-weight: 700; 
            padding: 10px 25px; border: 2px solid var(--mauve-text); border-radius: 50px; 
            background: white; box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: 0.3s; cursor: none !important; 
        }
        .back-btn:hover { transform: translateY(-3px); box-shadow: 6px 6px 0px var(--strong-pink); }

        /* --- ЗАГОЛОВОК --- */
        h1 { font-family: 'Comfortaa'; font-size: 2.5rem; margin: 20px 0 50px; text-align: center; }

        /* --- СЕТКА КАРТОЧЕК --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
        }

        .category-card {
            text-decoration: none;
            color: var(--mauve-text);
            background: white;
            border: 3px solid var(--mauve-text);
            border-radius: 25px;
            padding: 45px 25px;
            text-align: center;
            box-shadow: 12px 12px 0px var(--soft-pink);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .category-card:hover {
            transform: translate(6px, 6px);
            box-shadow: 4px 4px 0px var(--mauve-text);
            background-color: var(--soft-pink);
        }

        .card-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .card-title { font-family: 'Comfortaa'; font-size: 1.6rem; font-weight: 700; }
        .card-desc { font-size: 0.95rem; opacity: 0.8; line-height: 1.5; }

        @media (max-width: 600px) {
            .catalog-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="bg-gradient"></div>
    <canvas id="stars-canvas"></canvas>

    <nav class="nav-header">
        <a href="index.html" class="back-btn">← Home</a>
    </nav>

    <h1>Creative Portfolio</h1>

    <main class="catalog-grid">
        <a href="websites.html" class="category-card">
            <div class="card-icon">🌐</div>
            <div class="card-title">Websites</div>
            <p class="card-desc">Custom landing pages & creative web designs</p>
        </a>

        <a href="logos.html" class="category-card">
            <div class="card-icon">✨</div>
            <div class="card-title">Logos</div>
            <p class="card-desc">Unique symbols that tell your brand story</p>
        </a>

        <a href="art.html" class="category-card">
            <div class="card-icon">🌸</div>
            <div class="card-title">Digital Art</div>
            <p class="card-desc">Hand-drawn illustrations and social media art</p>
        </a>
    </main>

    <script>
        // ЛОГИКА КУРСОРA ИЗ INDEX
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Звездная пыль
            if (Math.random() > 0.6) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                document.body.appendChild(s);
                const size = Math.random() * 8 + 2;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.left = e.clientX + 'px';
                s.style.top = e.clientY + 'px';
                s.animate([
                    { opacity: 1, transform: 'scale(1)' },
                    { opacity: 0, transform: `translate(${(Math.random()-0.5)*120}px, ${(Math.random()-0.5)*120}px) scale(0)` }
                ], { duration: 1000, easing: 'ease-out' });
                setTimeout(() => s.remove(), 1000);
            }
        });

        // ЛОГИКА ЗВЕЗД ИЗ INDEX
        const sCanvas = document.getElementById('stars-canvas');
        const sCtx = sCanvas.getContext('2d');
        let particles = [];

        function resize() {
            sCanvas.width = window.innerWidth;
            sCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * sCanvas.width,
                y: Math.random() * sCanvas.height,
                size: Math.random() * 1.5,
                opacity: Math.random(),
                speed: 0.005 + Math.random() * 0.002
            });
        }

        function animate() {
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            particles.forEach(p => {
                p.opacity += p.speed;
                if (p.opacity > 1 || p.opacity < 0) p.speed = -p.speed;
                sCtx.globalAlpha = p.opacity;
                sCtx.fillStyle = "white";
                sCtx.beginPath();
                sCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                sCtx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
