<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #63414C;
            --bg-cream: #FDFBF7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            animation: fadeIn 0.8s ease-out forwards;
        }

        #stars-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; pointer-events: none; opacity: 0.5; 
        }
        
        /* КУРСОР ИЗ ABOUT.HTML */
        #custom-cursor { 
            position: fixed; width: 25px; height: 25px; background: white; 
            border: 2px solid var(--mauve-text); border-radius: 2px 50% 50% 50%; 
            transform: translate(-50%, -50%) rotate(-45deg); 
            pointer-events: none; z-index: 10000; box-shadow: 2px 2px 0px var(--soft-pink); 
        }
        
        /* ЧАСТИЦЫ ПЫЛИ */
        .sparkle { 
            position: fixed; 
            border-radius: 50%; 
            pointer-events: none; 
            z-index: 9999; 
        }

        /* --- ЦЕНТРАЛЬНАЯ НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 30px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            z-index: 100;
        }
        
        .nav-btn { 
            text-decoration: none; 
            color: var(--mauve-text); 
            font-weight: 700; 
            font-size: 0.95rem;
            padding: 12px 28px; 
            border: 2px solid var(--mauve-text); 
            border-radius: 50px; 
            background: white; 
            box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important; 
        }

        .nav-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 7px 7px 0px var(--strong-pink);
            background-color: white;
        }

        h1 { font-family: 'Comfortaa'; font-size: 2.8rem; margin: 20px 0 60px; text-align: center; }

        /* --- СЕТКА КАТАЛОГА --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 50px;
        }

        .category-card {
            text-decoration: none;
            color: var(--mauve-text);
            background: white;
            border: 3px solid var(--mauve-text);
            border-radius: 25px;
            padding: 50px 25px;
            text-align: center;
            box-shadow: 12px 12px 0px var(--soft-pink);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .category-card:hover {
            transform: translate(6px, 6px);
            box-shadow: 4px 4px 0px var(--mauve-text);
            background-color: var(--soft-pink);
        }

        .card-icon { font-size: 3.8rem; margin-bottom: 5px; }
        .card-title { font-family: 'Comfortaa'; font-size: 1.7rem; font-weight: 700; }
        .card-desc { font-size: 1rem; opacity: 0.8; line-height: 1.5; }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .nav-btn { padding: 10px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="stars-canvas"></canvas>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="about.html" class="nav-btn">About me</a>
    </nav>

    <h1>Creative Portfolio</h1>

    <main class="catalog-grid">
        <a href="websites.html" class="category-card">
            <div class="card-icon">🌐</div>
            <div class="card-title">Websites</div>
            <p class="card-desc">Custom landing pages & creative web designs</p>
        </a>

        <a href="logos.html" class="category-card">
            <div class="card-icon">✨</div>
            <div class="card-title">Logos</div>
            <p class="card-desc">Unique symbols that tell your brand story</p>
        </a>

        <a href="art.html" class="category-card">
            <div class="card-icon">🌸</div>
            <div class="card-title">Digital Art</div>
            <p class="card-desc">Hand-drawn illustrations and social media art</p>
        </a>
    </main>

    <script>
        // --- ПОЛНАЯ КОПИЯ ЛОГИКИ КУРСОРA ИЗ ABOUT.HTML ---
        const cursor = document.getElementById('custom-cursor');
        
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Создание пыли (sparkles)
            if (Math.random() > 0.6) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                document.body.appendChild(sparkle);
                
                const size = Math.random() * 8 + 2;
                sparkle.style.width = size + 'px';
                sparkle.style.height = size + 'px';
                
                // Цвет частиц: белый или розовый (как в оригинале)
                sparkle.style.background = Math.random() > 0.5 ? 'white' : 'var(--strong-pink)';
                
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                
                // Анимация разлета
                const destinationX = (Math.random() - 0.5) * 100;
                const destinationY = (Math.random() - 0.5) * 100;
                
                sparkle.animate([
                    { opacity: 1, transform: 'translate(0, 0) scale(1)' },
                    { opacity: 0, transform: `translate(${destinationX}px, ${destinationY}px) scale(0)` }
                ], {
                    duration: 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });
                
                setTimeout(() => sparkle.remove(), 1000);
            }
        });

        // --- ЛОГИКА ЗВЕЗДНОГО ФОНА ---
        const sCanvas = document.getElementById('stars-canvas');
        const sCtx = sCanvas.getContext('2d');
        let particles = [];
        function resize() { sCanvas.width = window.innerWidth; sCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * sCanvas.width,
                y: Math.random() * sCanvas.height,
                size: Math.random() * 1.2,
                opacity: Math.random(),
                speed: 0.003 + Math.random() * 0.002
            });
        }
        function animate() {
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            particles.forEach(p => {
                p.opacity += p.speed;
                if (p.opacity > 0.8 || p.opacity < 0) p.speed = -p.speed;
                sCtx.globalAlpha = p.opacity;
                sCtx.fillStyle = "white";
                sCtx.beginPath();
                sCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                sCtx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
