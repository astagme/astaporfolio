<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        /* --- ПЛАВНОСТЬ ЗАГРУЗКИ --- */
        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            opacity: 0; 
            transition: opacity 0.6s ease-out;
            cursor: none !important;
            color: var(--mauve-text);
            min-height: 100vh;
        }

        body.fade-in { opacity: 1; }

        /* --- ЕДИНЫЙ КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s, width 0.2s, height 0.2s;
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        /* --- ИСКОРКИ (ЗВЕЗДНАЯ ПЫЛЬ) --- */
        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
            box-shadow: 0 0 10px var(--soft-pink);
        }

        /* --- НАВИГАЦИЯ --- */
        nav { padding: 40px; display: flex; justify-content: center; gap: 20px; }
        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid var(--strong-pink);
            background: white;
            transition: 0.3s;
            cursor: none !important;
        }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--soft-pink); }

        /* --- КАТАЛОГ --- */
        .catalog-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 40px 80px;
            text-align: center;
        }

        .catalog-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 50px;
            color: #5D3D48;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .category-card {
            background: white;
            border: 3px solid var(--brown-outline);
            border-radius: 40px;
            padding: 50px 30px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 10px 10px 0px var(--soft-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: none !important;
        }

        .category-card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 15px 15px 0px var(--strong-pink);
            background: #FFF9FB;
        }

        .category-icon { font-size: 60px; margin-bottom: 20px; transition: 0.3s; }
        .category-card:hover .category-icon { transform: scale(1.2) rotate(5deg); }

        .category-card h3 { 
            font-family: 'Quicksand', sans-serif; 
            font-size: 1.8rem; 
            margin: 10px 0; 
            color: #5D3D48; 
        }

        .category-card p { margin: 0; color: var(--mauve-text); opacity: 0.8; }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn, .category-card { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="about.html" class="nav-btn">About Me</a>
    </nav>

    <main class="catalog-container">
        <h1 class="catalog-title">Portfolio</h1>
        <div class="catalog-grid">
            <a href="logos.html" class="category-card">
                <div class="category-icon">🎨</div>
                <h3>Logos</h3>
                <p>Branding & visual identity</p>
            </a>
            <a href="art.html" class="category-card">
                <div class="category-icon">✨</div>
                <h3>Illustrations</h3>
                <p>Digital art & character design</p>
            </a>
            <a href="websites.html" class="category-card">
                <div class="category-icon">💻</div>
                <h3>Websites</h3>
                <p>UI/UX & creative coding</p>
            </a>
        </div>
    </main>

    <script>
        // 1. Плавная загрузка
        window.addEventListener('load', () => { document.body.classList.add('fade-in'); });

        // 2. Логика курсора
        const cursor = document.getElementById('custom-cursor');
        
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            createSparkle(e.clientX, e.clientY);
        });

        // 3. Звездная пыль
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 8 + 2;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `${x}px`;
            sparkle.style.top = `${y}px`;
            const destX = x + (Math.random() - 0.5) * 80;
            const destY = y + (Math.random() - 0.5) * 80;
            sparkle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(0)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => sparkle.remove(), 1000);
        }

        // 4. Реакция на интерактивные элементы
        const refresh = () => {
            document.querySelectorAll('.nav-btn, .category-card, a').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
            });
        };
        refresh();

        // 5. Плавный переход между страницами
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.hostname === window.location.hostname && this.href.includes('.html')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = this.href; }, 500);
                }
            });
        });
    </script>
</body>
</html>
