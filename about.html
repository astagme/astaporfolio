<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0; 
            transition: opacity 0.6s ease-out;
        }

        body.fade-in { opacity: 1 !important; }

        /* --- КУРСОР И ПЫЛЬ --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
        }

        /* --- НАВИГАЦИЯ (как на остальных страницах) --- */
        .nav-header { 
            width: 100%; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }
        
        .nav-btn { 
            text-decoration: none; 
            color: var(--brown-outline); 
            font-weight: 700; 
            padding: 12px 28px; 
            border: 2px solid var(--brown-outline); 
            border-radius: 50px; 
            background: white; 
            box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important; 
        }

        .nav-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 7px 7px 0px var(--strong-pink);
        }

        /* --- КОНТЕНТ --- */
        .about-container {
            max-width: 900px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .profile-pic-container {
            width: 220px;
            height: 220px;
            border: 4px solid var(--brown-outline);
            border-radius: 50% 20% 50% 20%;
            overflow: hidden;
            box-shadow: 15px 15px 0px var(--soft-pink);
            margin-bottom: 40px;
            background: white;
        }

        .profile-pic-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 2.8rem;
            color: var(--brown-outline);
            margin-bottom: 20px;
        }

        .description {
            font-size: 1.2rem;
            line-height: 1.8;
            max-width: 600px;
            margin-bottom: 40px;
        }

        /* --- КНОПКИ СОЦСЕТЕЙ + ОТЗЫВЫ --- */
        .social-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .social-btn {
            width: 65px;
            height: 65px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            box-shadow: 4px 4px 0px var(--soft-pink);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important;
            overflow: hidden;
        }

        .social-btn:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 6px 6px 0px var(--strong-pink);
        }

        .social-btn img {
            width: 60%;
            height: 60%;
            object-fit: contain;
        }

        @media (max-width: 600px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn, .social-btn { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Catalog</a>
    </nav>

    <main class="about-container">
        <div class="profile-pic-container">
            <img src="photo.jpg" alt="Astagme">
        </div>

        <h1>Hi, I'm Astagme! ✨</h1>
        
        <p class="description">
            I am a beginner graphic designer passionate about soft aesthetics and meaningful visual stories. 
            I love creating identities that feel like a warm hug.
        </p>

        <div class="social-links">
            <a href="#" class="social-btn" title="Telegram">📱</a>
            <a href="#" class="social-btn" title="Instagram">📸</a>
            <a href="#" class="social-btn" title="Mail">✉️</a>
            
            <a href="reviews.html" class="social-btn" title="My Reviews">
                <img src="icons/reviews.png" alt="Reviews">
            </a>
        </div>
    </main>

    <script>
        function showPage() {
            document.body.classList.add('fade-in');
            document.body.style.opacity = '1';
        }

        window.addEventListener('load', showPage);
        window.addEventListener('pageshow', (event) => { showPage(); });

        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 8 + 2;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            const destX = x + (Math.random() - 0.5) * 80;
            const destY = y + (Math.random() - 0.5) * 80;
            sparkle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(0)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => sparkle.remove(), 1000);
        }

        document.querySelectorAll('a, .profile-pic-container').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href.includes('.html') && !href.startsWith('http')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = href; }, 500);
                }
            });
        });
    </script>
</body>
</html>
