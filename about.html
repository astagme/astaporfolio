<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
            --glass-white: rgba(255, 255, 255, 0.4);
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Плавное появление */
            opacity: 0; 
            transition: opacity 0.8s ease-out;
        }

        body.fade-in { opacity: 1 !important; }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }
        
        .nav-btn { 
            text-decoration: none; 
            color: var(--brown-outline); 
            font-weight: 700; 
            padding: 12px 28px; 
            border: 2px solid var(--brown-outline); 
            border-radius: 50px; 
            background: white; 
            box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: all 0.3s ease;
            cursor: none !important; 
        }

        .nav-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 7px 7px 0px var(--strong-pink);
        }

        /* --- ГЛАВНЫЙ КОНТЕЙНЕР (ДВЕ КОЛОНКИ) --- */
        .main-layout {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 50px;
            max-width: 1100px;
            width: 90%;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        /* --- ЛЕВАЯ СТЕКЛЯННАЯ КАРТОЧКА --- */
        .glass-card {
            flex: 1.5;
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .profile-pic-container {
            width: 200px;
            height: 200px;
            border: 4px solid white;
            border-radius: 50% 20% 50% 20%;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .profile-pic-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 2.5rem;
            color: var(--brown-outline);
            margin-bottom: 20px;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--mauve-text);
        }

        /* --- ПРАВАЯ КОЛОНКА (СОЦСЕТИ) --- */
        .side-links {
            flex: 0.5;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 50px;
        }

        .social-card {
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            color: var(--brown-outline);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 6px 6px 0px var(--soft-pink);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important;
        }

        .social-card:hover {
            transform: translateX(10px);
            box-shadow: 2px 2px 0px var(--brown-outline);
            background-color: var(--soft-pink);
        }

        .social-icon { font-size: 1.5rem; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; align-items: center; }
            .side-links { flex-direction: row; flex-wrap: wrap; justify-content: center; position: static; }
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn, .social-card { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Catalog</a>
    </nav>

    <div class="main-layout">
        <main class="glass-card">
            <div class="profile-pic-container">
                <img src="photo.jpg" alt="Astagme">
            </div>

            <h1>Hi, I'm Astagme! ✨</h1>
            
            <p class="description">
                I am a beginner graphic designer passionate about soft aesthetics and meaningful visual stories. 
                I love creating identities that feel like a warm hug. My work focuses on simplicity, 
                readability, and a touch of magic.
            </p>
        </main>

        <aside class="side-links">
            <a href="#" class="social-card">
                <span class="social-icon">📱</span>
                <span>Telegram</span>
            </a>
            <a href="#" class="social-card">
                <span class="social-icon">📸</span>
                <span>Instagram</span>
            </a>
            <a href="#" class="social-card">
                <span class="social-icon">✉️</span>
                <span>E-mail</span>
            </a>
        </aside>
    </div>

    <script>
        // Проявление страницы
        function showPage() { document.body.classList.add('fade-in'); }
        window.addEventListener('load', showPage);
        window.addEventListener('pageshow', showPage);
        setTimeout(showPage, 100);

        // Курсор
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 6 + 2;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = e.clientX + 'px';
            sparkle.style.top = e.clientY + 'px';
            
            const destX = e.clientX + (Math.random() - 0.5) * 60;
            const destY = e.clientY + (Math.random() - 0.5) * 60;
            
            sparkle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destX - e.clientX}px, ${destY - e.clientY}px) scale(0)`, opacity: 0 }
            ], { duration: 800 });
            setTimeout(() => sparkle.remove(), 800);
        });

        // Интерактив
        document.querySelectorAll('a, .profile-pic-container').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });

        // Плавный уход
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href !== '#' && href.includes('.html')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = href; }, 500);
                }
            });
        });
    </script>
</body>
</html>
