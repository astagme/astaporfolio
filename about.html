<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
    /* ... (предыдущие стили) ... */

    .profile-pic-container {
        width: 220px; /* Немного увеличим для солидности */
        height: 220px;
        margin: 0 auto 30px;
        position: relative;
        /* Убираем лишние завихрения, делаем четкий круг */
        border-radius: 50%; 
        border: 4px solid var(--brown-outline);
        background: white;
        box-shadow: 10px 10px 0px var(--soft-pink);
        overflow: hidden; /* Это заставит фото обрезаться строго по кругу */
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .profile-pic-container:hover {
        transform: scale(1.05) rotate(5deg);
        box-shadow: 15px 15px 0px var(--strong-pink);
    }

    .profile-pic {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Теперь фото заполнит круг без искажений */
        display: block;
    }

    /* ... (остальные стили) ... */
</style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Portfolio</a>
    </nav>

    <main class="about-container">
    <div class="profile-pic-container">
        <img src="photo.jpg" alt="Astagme photo" class="profile-pic">
    </div>
    
    <h1>Hi, I'm Astagme! ✨</h1>
    </main>

    <script>
        window.addEventListener('load', () => { document.body.classList.add('fade-in'); });

        const cursor = document.getElementById('custom-cursor');
        
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 8 + 2;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `${x}px`;
            sparkle.style.top = `${y}px`;
            const destX = x + (Math.random() - 0.5) * 80;
            const destY = y + (Math.random() - 0.5) * 80;
            sparkle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destX - x}px, ${destY - y}px) scale(0)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out', fill: 'forwards' });
            setTimeout(() => sparkle.remove(), 1000);
        }

        const refresh = () => {
            document.querySelectorAll('.nav-btn, .social-btn, .profile-pic, a').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
            });
        };
        refresh();

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.hostname === window.location.hostname && this.href.includes('.html')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = this.href; }, 500);
                }
            });
        });
    </script>
</body>
</html>
