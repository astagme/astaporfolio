<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Важно: если экран белый, убедись, что opacity меняется на 1 */
            opacity: 0; 
            transition: opacity 0.5s ease-in-out;
        }

        body.fade-in { 
            opacity: 1 !important; 
        }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }
        
        .nav-btn { 
            text-decoration: none; 
            color: var(--brown-outline); 
            font-weight: 700; 
            padding: 12px 28px; 
            border: 2px solid var(--brown-outline); 
            border-radius: 50px; 
            background: white; 
            box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important; 
        }

        .nav-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 7px 7px 0px var(--strong-pink);
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 3rem;
            color: var(--brown-outline);
            margin: 10px 0;
            text-align: center;
        }

        /* --- СЕТКА ОТЗЫВОВ --- */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 50px;
        }

        .review-card {
            background: white;
            border: 3px solid var(--brown-outline);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 8px 8px 0px var(--soft-pink);
            transition: 0.3s ease;
        }

        .review-card:hover {
            transform: translateY(-5px);
            box-shadow: 12px 12px 0px var(--soft-pink);
        }

        .review-text { font-size: 1rem; line-height: 1.6; font-style: italic; margin-bottom: 15px; }
        .review-author { font-weight: 700; color: var(--brown-outline); display: block; }
        .review-tag { font-size: 0.8rem; opacity: 0.7; }

        @media (max-width: 600px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="about.html" class="nav-btn">About me</a>
        <a href="catalog.html" class="nav-btn">Catalog</a>
    </nav>

    <h1>Kind Words ✨</h1>

    <main class="reviews-grid">
        <div class="review-card">
            <p class="review-text">"Amazing work! The soft aesthetic is exactly what I was looking for."</p>
            <span class="review-author">Client Name</span>
            <span class="review-tag">Logo Design</span>
        </div>
        <div class="review-card">
            <p class="review-text">"Super easy to work with and very creative results."</p>
            <span class="review-author">Another Client</span>
            <span class="review-tag">Web Design</span>
        </div>
    </main>

    <script>
        // ГЛАВНОЕ: Проявление страницы
        function reveal() {
            document.body.classList.add('fade-in');
        }

        window.addEventListener('load', reveal);
        window.addEventListener('pageshow', reveal);
        setTimeout(reveal, 100); // Страховка от белого экрана

        // КУРСОР
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Пыль
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            sparkle.style.width = '6px';
            sparkle.style.height = '6px';
            sparkle.style.left = e.clientX + 'px';
            sparkle.style.top = e.clientY + 'px';
            
            sparkle.animate([
                { transform: 'scale(1)', opacity: 1 },
                { transform: 'scale(0) translate(20px, 20px)', opacity: 0 }
            ], { duration: 800 });
            setTimeout(() => sparkle.remove(), 800);
        });

        // Плавный уход при клике
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const target = this.getAttribute('href');
                if (target && target.includes('.html')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = target; }, 400);
                }
            });
        });

        // Увеличение курсора
        document.querySelectorAll('a, .review-card').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });
    </script>
</body>
</html>
