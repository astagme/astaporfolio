<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Design | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;

            /* --- ПЛАВНЫЙ ПЕРЕХОД --- */
            opacity: 0; 
            transition: opacity 0.8s ease-in-out;
        }

        /* Класс видимости */
        body.visible { 
            opacity: 1; 
        }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }
        
        .nav-btn { 
            text-decoration: none; 
            color: var(--brown-outline); 
            font-weight: 700; 
            padding: 12px 28px; 
            border: 2px solid var(--brown-outline); 
            border-radius: 50px; 
            background: white; 
            box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: all 0.3s ease;
            cursor: none !important; 
        }

        .nav-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 7px 7px 0px var(--strong-pink);
        }

        .header-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .category-icon {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 3rem;
            color: var(--brown-outline);
            margin: 0;
        }

        /* --- ЛОГОТИПЫ --- */
        .logos-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 80px;
