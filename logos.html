<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Design | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0; 
            transition: opacity 0.6s ease-out;
        }

        body.fade-in { opacity: 1 !important; }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }
        
        .nav-btn { 
            text-decoration: none; 
            color: var(--brown-outline); 
            font-weight: 700; 
            padding: 12px 28px; 
            border: 2px solid var(--brown-outline); 
            border-radius: 50px; 
            background: white; 
            box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: all 0.3s ease;
            cursor: none !important; 
        }

        .nav-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 7px 7px 0px var(--strong-pink);
        }

        /* --- КОНТЕНТ --- */
        .header-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .category-icon {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 3rem;
            color: var(--brown-outline);
            margin: 0;
        }

        /* --- ГАЛЕРЕЯ ЛОГОТИПОВ --- */
        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1100px;
            padding-bottom: 100px;
        }

        .art-item {
            background: white;
            border: 3px solid var(--brown-outline);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 8px 8px 0px var(--soft-pink);
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; /* Квадратные карточки для лого */
        }

        .art-item:hover {
            transform: scale(1.02);
            box-shadow: 12px 12px 0px var(--soft-pink);
        }

        .art-item img {
            width: 80%; /* Логотипам нужно чуть больше пространства по краям */
            height: auto;
            display: block;
        }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn, .art-item { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Catalog</a>
        <a href="about.html" class="nav-btn">About me</a>
    </nav>

    <header class="header-section">
        <img src="catalog/logos.png" alt="Logo Design Icon" class="category-icon">
        <h1>Logo Design</h1>
    </header>

    <main class="art-grid">
        <div class="art-item"><img src="catalog/logo1.png" alt="Logo 1"></div>
        <div class="art-item"><img src="catalog/logo2.png" alt="Logo 2"></div>
        <div class="art-item"><img src="catalog/logo3.png" alt="Logo 3"></div>
    </main>

    <script>
        function showPage() { document.body.classList.add('fade-in'); }
        window.addEventListener('load', showPage);
        window.addEventListener('pageshow', showPage);
        setTimeout(showPage, 100);

        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 6 + 2;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = e.clientX + 'px';
            sparkle.style.top = e.clientY + 'px';
            
            const destX = e.clientX + (Math.random() - 0.5) * 60;
            const destY = e.clientY + (Math.random() - 0.5) * 60;
            
            sparkle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destX - e.clientX}px, ${destY - e.clientY}px) scale(0)`, opacity: 0 }
            ], { duration: 800 });
            setTimeout(() => sparkle.remove(), 800);
        });

        document.querySelectorAll('a, .art-item').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href !== '#' && href.includes('.html')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = href; }, 500);
                }
            });
        });
    </script>
</body>
</html>
