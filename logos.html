<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logos | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        /* --- ПЛАВНОСТЬ И БАЗА --- */
        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            opacity: 0; 
            transition: opacity 0.6s ease-out;
            cursor: none !important;
            color: var(--mauve-text);
            overflow-x: hidden;
        }

        body.fade-in { opacity: 1; }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: rotate(-45deg) translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: width 0.2s, height 0.2s, background 0.2s;
        }

        .cursor-active {
            width: 40px !important;
            height: 40px !important;
            background: var(--soft-pink) !important;
            opacity: 0.7;
        }

        /* --- НАВИГАЦИЯ --- */
        nav { padding: 40px; display: flex; justify-content: center; gap: 20px; }
        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid var(--strong-pink);
            background: white;
            transition: 0.3s;
            cursor: none !important;
        }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--soft-pink); }

        /* --- СЕТКА ГАЛЕРЕИ --- */
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 100px;
            text-align: center;
        }

        h1 { font-family: 'Quicksand', sans-serif; font-size: 3.5rem; margin-bottom: 60px; color: #5D3D48; }

        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 80px; /* Большой отступ для "воздуха" */
            align-items: center;
        }

        .logo-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: none !important;
        }

        /* Обертка для самого PNG */
        .img-wrapper {
            position: relative;
            width: 100%;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s ease;
        }

        .logo-card img {
            max-width: 85%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.05)); /* Легкая базовая тень */
            transition: 0.5s ease;
        }

        /* ЭФФЕКТ ПРИ НАВЕДЕНИИ */
        .logo-card:hover .img-wrapper {
            transform: translateY(-20px); /* Взлет */
        }

        .logo-card:hover img {
            filter: drop-shadow(0 20px 30px rgba(244, 194, 215, 0.8)); /* Розовое свечение */
            transform: scale(1.05);
        }

        .logo-info {
            margin-top: 20px;
            transition: 0.3s;
            opacity: 0.8;
        }

        .logo-card:hover .logo-info { opacity: 1; transform: translateY(-5px); }

        .logo-title { font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 1.4rem; color: #5D3D48; }
        .logo-category { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; color: var(--strong-pink); }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .logo-card, .nav-btn { cursor: pointer !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">← Catalog</a>
    </nav>

    <main class="gallery-container">
        <h1>Selected Logos ✨</h1>
        
        <div class="logo-grid">
            <div class="logo-card">
                <div class="img-wrapper">
                    <img src="font.png" alt="Astagme Logo">
                </div>
                <div class="logo-info">
                    <div class="logo-title">Astagme Identity</div>
                    <div class="logo-category">Bubblegum Style</div>
                </div>
            </div>

            <div class="logo-card">
                <div class="img-wrapper">
                    <img src="metal-logo.png" alt="Metal Logo" onerror="this.src='https://via.placeholder.com/400x400/FDFBF7/F4C2D7?text=Metal+Logo+Coming+Soon'">
                </div>
                <div class="logo-info">
                    <div class="logo-title">Chrome Vision</div>
                    <div class="logo-category">Heavy Metal Style</div>
                </div>
            </div>
            
            </div>
    </main>

    <script>
        window.addEventListener('load', () => { document.body.classList.add('fade-in'); });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.hostname === window.location.hostname && this.href.includes('.html')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = this.href; }, 500);
                }
            });
        });

        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('.nav-btn, .logo-card').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });
    </script>
</body>
</html>
