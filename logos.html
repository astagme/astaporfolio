<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logos | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
            --glow: rgba(255, 219, 234, 0.8);
        }

        /* --- ПЛАВНОСТЬ --- */
        body {
            background-color: var(--bg-cream);
            font-family: 'Comfortaa', cursive;
            margin: 0;
            opacity: 0; 
            transition: opacity 0.5s ease;
            cursor: none !important;
            color: var(--mauve-text);
            min-height: 100vh;
        }

        body.fade-in {
            opacity: 1;
        }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: rotate(-45deg) translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
        }

        #custom-cursor::after {
            content: '';
            position: absolute;
            width: 7px; height: 7px;
            background: var(--soft-pink);
            border-radius: 50%;
            top: 5px; left: 5px;
        }

        .cursor-active {
            transform: rotate(-45deg) translate(-50%, -50%) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        /* --- НАВИГАЦИЯ --- */
        nav {
            padding: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .nav-btn {
            text-decoration: none;
            color: var(--mauve-text);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid var(--strong-pink);
            background: white;
            font-weight: 500;
            transition: 0.3s;
            cursor: none !important;
        }

        .nav-btn:hover {
            background: var(--soft-pink);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--glow);
        }

        /* --- ГАЛЕРЕЯ --- */
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 100px;
            text-align: center;
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 3rem;
            margin-bottom: 50px;
            color: #5D3D48;
        }

        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .logo-card {
            background: white;
            border-radius: 40px;
            padding: 20px;
            border: 2px solid var(--soft-pink);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important;
            text-align: left;
        }

        .logo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px var(--glow);
            border-color: var(--strong-pink);
        }

        .card-image-wrapper {
            background: #FFF9FB;
            border-radius: 25px;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .logo-card img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(244, 194, 215, 0.4));
            transition: 0.4s;
        }

        .logo-card:hover img {
            transform: scale(1.08);
        }

        .logo-title {
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 1.3rem;
            color: #5D3D48;
            margin-left: 10px;
        }

        .logo-category {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-left: 10px;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn, .logo-card { cursor: pointer !important; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">← Back to Catalog</a>
    </nav>

    <main class="gallery-container">
        <h1>Logo Design ✨</h1>
        
        <div class="logo-grid">
            <div class="logo-card">
                <div class="card-image-wrapper">
                    <img src="font.png" alt="Astagme Logo">
                </div>
                <div class="logo-title">Astagme Identity</div>
                <div class="logo-category">Personal Branding</div>
            </div>

            <div class="logo-card">
                <div class="card-image-wrapper">
                    <img src="https://via.placeholder.com/400x400/FFDBEA/A67081?text=Your+Work" alt="Project">
                </div>
                <div class="logo-title">Project Name</div>
                <div class="logo-category">Logo Design</div>
            </div>
        </div>
    </main>

    <script>
        // 1. ПЛАВНОСТЬ ПРИ ЗАГРУЗКЕ
        window.addEventListener('load', () => {
            document.body.classList.add('fade-in');
        });

        // ПЛАВНЫЙ ПЕРЕХОД ПО ССЫЛКАМ
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.hostname === window.location.hostname && this.href.includes('.html')) {
                    e.preventDefault();
                    const target = this.href;
                    document.body.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = target;
                    }, 500);
                }
            });
        });

        // 2. КУРСОР
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactables = document.querySelectorAll('.nav-btn, .logo-card');
        interactables.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });
    </script>
</body>
</html>
