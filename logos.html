<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Portfolio | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Тут будут наши стандартные переменные и курсор (как в Catalog) */
        :root { --soft-pink: #FFDBEA; --mauve-text: #A67081; --bg-cream: #FDFBF7; }
        
        body { background: var(--bg-cream); font-family: 'Quicksand', sans-serif; margin: 0; opacity: 0; transition: opacity 0.5s; cursor: none !important; }
        body.fade-in { opacity: 1; }

        .gallery-container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; text-align: center; }
        
        /* Сетка для логотипов */
        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 50px;
        }

        .logo-item {
            background: white;
            border-radius: 25px;
            padding: 20px;
            border: 2px solid var(--soft-pink);
            transition: 0.3s;
            cursor: none !important;
        }

        .logo-item:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(244, 194, 215, 0.4);
        }

        .logo-item img {
            width: 100%;
            border-radius: 15px;
            display: block;
        }

        .logo-info { margin-top: 15px; color: var(--mauve-text); }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <nav style="text-align: center; padding: 30px;">
        <a href="catalog.html" style="text-decoration: none; color: #A67081;">← Back to Catalog</a>
    </nav>

    <div class="gallery-container">
        <h1>Logo Design Gallery</h1>
        <p>A collection of visual identities created with love.</p>

        <div class="logo-grid">
            <div class="logo-item">
                <img src="work1.jpg" alt="Logo Name">
                <div class="logo-info">
                    <strong>Project Name</strong>
                    <p>Branding, 2024</p>
                </div>
            </div>
            </div>
    </div>

    <script>
        // Добавь сюда тот же скрипт для плавного появления и курсора
        document.body.classList.add('fade-in');
        // ... код для курсора
    </script>
</body>
</html>
