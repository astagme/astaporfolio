<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Art | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* --- ПЛАВНЫЙ ПЕРЕХОД --- */
            opacity: 0; 
            transition: opacity 0.8s ease-in-out;
        }

        /* Класс, который делает страницу видимой */
        body.visible { 
            opacity: 1; 
        }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            display: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }
        
        .nav-btn { 
            text-decoration: none; 
            color: var(--brown-outline); 
            font-weight: 700; 
            padding: 12px 28px; 
            border: 2px solid var(--brown-outline); 
            border-radius: 50px; 
            background: white; 
            box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: all 0.3s ease;
            cursor: none !important; 
        }

        .nav-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 7px 7px 0px var(--strong-pink);
        }

        .header-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .category-icon {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 3rem;
            color: var(--brown-outline);
            margin: 0;
        }

        /* --- ГАЛЕРЕЯ --- */
        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 60px; 
            width: 90%;
            max-width: 1100px;
            padding-bottom: 100px;
        }

        .art-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .art-item {
            position: relative;
            background: white;
            border: 3px solid var(--brown-outline);
            border-radius: 30px;
            height: 350px; 
            width: 100%;
            overflow: hidden;
            filter: drop-shadow(0 0 10px var(--soft-pink));
            transition: all 0.4s ease;
            margin-bottom: 15px;
        }

        .art-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: all 0.4s ease;
        }

        .art-name {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--brown-outline);
            transition: all 0.3s ease;
        }

        /* ЭФФЕКТ ПРИ НАВЕДЕНИИ */
        .art-card:hover {
            transform: translateY(-15px);
        }

        .art-card:hover .art-item {
            filter: drop-shadow(0 0 15px var(--strong-pink)) drop-shadow(0 0 30px var(--soft-pink));
        }

        .art-card:hover img {
            transform: scale(1.05); 
        }

        .art-card:hover .art-name {
            color: var(--mauve-text);
            text-shadow: 1px 1px 0px var(--soft-pink);
        }

        @media (max-width: 850px) {
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
            .nav-btn { cursor: pointer !important; }
            .art-item { height: 300px; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Catalog</a>
        <a href="about.html" class="nav-btn">About me</a>
    </nav>

    <header class="header-section">
        <img src="catalog/digital.png" alt="Digital Art Icon" class="category-icon">
        <h1>Digital Art</h1>
    </header>

    <main class="art-grid">
        <div class="art-card">
            <div class="art-item">
                <img src="illustrations/art1.jpg" alt="Art 1">
            </div>
            <span class="art-name">Custom character | Half</span>
        </div>

        <div class="art-card">
            <div class="art-item">
                <img src="illustrations/art2.jpg" alt="Art 2">
            </div>
            <span class="art-name">Custom character | Full body</span>
        </div>

        <div class="art-card">
            <div class="art-item">
                <img src="illustrations/art3.jpg" alt="Art 3">
            </div>
            <span class="art-name">Custom character | Male head</span>
        </div>

        <div class="art-card">
            <div class="art-item">
                <img src="illustrations/art4.jpg" alt="Art 4">
            </div>
            <span class="art-name">Custom art | Female head</span>
        </div>
    </main>

    <script>
        // Функция плавного появления
        window.addEventListener('load', () => {
            document.body.classList.add('visible');
        });

        // Плавный уход при переходе по ссылке
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                // Проверяем, что ссылка ведет на другую страницу .html
                if (href && href.includes('.html')) {
                    e.preventDefault();
                    document.body.classList.remove('visible'); // Страница исчезает
                    setTimeout(() => {
                        window.location.href = href;
                    }, 600); // Ждем завершения анимации
                }
            });
        });

        /* --- КУРСОР И ИСКРЫ --- */
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);
            const size = Math.random() * 6 + 2;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = e.clientX + 'px';
            sparkle.style.top = e.clientY + 'px';
            
            const destX = e.clientX + (Math.random() - 0.5) * 60;
            const destY = e.clientY + (Math.random() - 0.5) * 60;
            
            sparkle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${destX - e.clientX}px, ${destY - e.clientY}px) scale(0)`, opacity: 0 }
            ], { duration: 800 });
            setTimeout(() => sparkle.remove(), 800);
        });

        document.querySelectorAll('a, .art-card').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });
    </script>
</body>
</html>
