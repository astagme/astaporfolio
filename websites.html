<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Gallery | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            overflow-x: hidden;
        }

        body.visible { opacity: 1; }

        /* --- ФИКСИРОВАННАЯ НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 25px 0; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            position: fixed; /* Закрепляем сверху */
            top: 0; 
            left: 0; 
            z-index: 1000;
            background: rgba(253, 251, 247, 0.8); /* Полупрозрачный фон при скролле */
            backdrop-filter: blur(10px);
            border-bottom: 2px dashed var(--soft-pink);
        }

        .nav-btn { 
            text-decoration: none; color: var(--brown-outline); font-weight: 700;
            padding: 10px 24px; border: 2px solid var(--brown-outline); border-radius: 50px;
            background: white; box-shadow: 4px 4px 0px var(--soft-pink); transition: 0.3s;
            cursor: none !important;
        }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 6px 6px 0px var(--strong-pink); }

        /* --- ВЕРТИКАЛЬНЫЙ СПИСОК ИНСТРУМЕНТОВ СЛЕВА --- */
        .side-stack {
            position: fixed;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .stack-title {
            font-family: 'Quicksand';
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: var(--brown-outline);
            opacity: 0.6;
            transform: rotate(-90deg) translateX(-40px);
            width: 100px;
        }

        .tool-item {
            background: white;
            border: 2px solid var(--brown-outline);
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 3px 3px 0px var(--soft-pink);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .tool-item:hover { transform: translateX(10px); background: var(--soft-pink); }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed; width: 25px; height: 25px; background: white;
            border: 2px solid var(--brown-outline); border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg); pointer-events: none;
            z-index: 10000; box-shadow: 2px 2px 0px var(--soft-pink);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- КОНТЕНТ --- */
        .project-section {
            padding: 160px 20px 100px; /* Увеличили отступ сверху из-за фикс. меню */
            display: flex; flex-direction: column; align-items: center;
        }

        .display-unit { position: relative; width: 850px; margin-bottom: 40px; }

        .browser-frame {
            width: 100%; height: 500px; background: white; border: 3px solid var(--brown-outline);
            border-radius: 25px; box-shadow: 15px 15px 0px var(--soft-pink);
            overflow: hidden; position: relative; z-index: 2;
        }

        /* ТЕЛЕФОН С УЛУЧШЕННЫМ КАЧЕСТВОМ КАРТИНКИ */
        .phone-mockup {
            position: absolute; right: -80px; bottom: -50px;
            width: 200px; height: 410px; background: white;
            border: 3.5px solid var(--brown-outline); border-radius: 40px;
            box-shadow: 10px 10px 0px var(--strong-pink);
            z-index: 5; overflow: hidden; animation: floaty 6s infinite ease-in-out;
        }
        
        .phone-mockup img { 
            width: 100%; height: 100%; object-fit: cover; 
            /* КРИТИЧНО ДЛЯ КАЧЕСТВА: */
            image-rendering: -webkit-optimize-contrast; 
            image-rendering: crisp-edges;
            display: block;
        }

        .proj-meta { text-align: center; max-width: 700px; }
        .proj-meta h2 { font-size: 2.2rem; margin-bottom: 15px; color: var(--brown-outline); font-family: 'Quicksand'; }
        .proj-meta p { line-height: 1.8; color: var(--brown-outline); }

        .proj-controls { display: flex; gap: 20px; margin: 30px 0; }
        .arrow-btn {
            width: 55px; height: 55px; background: white; border: 2.5px solid var(--brown-outline);
            border-radius: 50%; box-shadow: 4px 4px 0px var(--soft-pink);
            font-size: 1.5rem; transition: 0.3s; cursor: none !important;
        }
        .arrow-btn:hover { transform: scale(1.1); box-shadow: 6px 6px 0px var(--strong-pink); }

        @media (max-width: 1150px) {
            .side-stack { display: none; }
            .display-unit { width: 90%; }
            .phone-mockup { display: none; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Catalog</a>
        <a href="about.html" class="nav-btn">About me</a>
    </nav>

    <aside class="side-stack">
        <div class="stack-title">Tech Stack</div>
        <div class="tool-item">Figma</div>
        <div class="tool-item">Photoshop</div>
        <div class="tool-item">Illustrator</div>
        <div class="tool-item">HTML/CSS</div>
        <div class="tool-item">JS</div>
    </aside>

    <section class="project-section" id="site1">
        <div class="display-unit">
            <div class="browser-frame">
                <div class="browser-top">
                    <div style="width:10px; height:10px; border:2px solid var(--brown-outline); border-radius:50%; background:white;"></div>
                    <div style="width:10px; height:10px; border:2px solid var(--brown-outline); border-radius:50%; background:white;"></div>
                </div>
                <div class="browser-content" style="height:100%; width:100%;">
                    <div class="screen-slide active" style="background-image: url('project1/desktop_1.png'); background-size:cover; height:100%;"></div>
                </div>
            </div>
            <div class="phone-mockup">
                <img src="project1/mobile_main.jpg" alt="High Quality Mobile Preview">
            </div>
        </div>

        <div class="proj-controls">
            <button class="arrow-btn" onclick="step(this, -1)">❮</button>
            <button class="arrow-btn" onclick="step(this, 1)">❯</button>
        </div>

        <div class="proj-meta">
            <h2>Personal Identity Site</h2>
            <p>
                A bespoke personal portfolio designed and developed from scratch to showcase my unique visual identity. 
                <strong>Every element, including custom icons, logo, and the functional code, was developed by me.</strong> 
            </p>
        </div>
    </section>

    <script>
        window.addEventListener('load', () => { document.body.classList.add('visible'); });

        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a, button, .tool-item').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1.5)');
            el.addEventListener('mouseleave', () => cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1)');
        });
    </script>
</body>
</html>
