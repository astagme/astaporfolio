<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Web Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #63414C;
            --bg-cream: #FDFBF7;
        }

        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-cream);
            margin: 0; cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
        }

        /* --- BACKGROUND & CURSOR --- */
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; background: linear-gradient(135deg, #fdfbf7, #ffdeeb, #fdfbf7, #e8d5ff, #fdfbf7); background-size: 500% 500%; animation: gradientMove 20s ease infinite; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        #custom-cursor { position: fixed; width: 25px; height: 25px; background: white; border: 2px solid var(--mauve-text); border-radius: 2px 50% 50% 50%; transform: translate(-50%, -50%) rotate(-45deg); pointer-events: none; z-index: 10000; box-shadow: 2px 2px 0px var(--soft-pink); }
        .sparkle { position: fixed; background: var(--strong-pink); border-radius: 50%; pointer-events: none; z-index: 9999; }

        /* --- НОВАЯ НАВИГАЦИЯ --- */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px 40px; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: rgba(253, 251, 247, 0.4); backdrop-filter: blur(8px);
        }

        .back-link {
            text-decoration: none; color: var(--mauve-text); font-weight: 700;
            padding: 8px 18px; border: 2px solid var(--mauve-text); border-radius: 50px;
            background: white; box-shadow: 3px 3px 0px var(--soft-pink);
            transition: 0.3s; cursor: none !important;
        }
        .back-link:hover { transform: translateY(-2px); box-shadow: 5px 5px 0px var(--strong-pink); }

        .jump-menu { display: flex; gap: 10px; }
        .jump-btn {
            text-decoration: none; color: var(--mauve-text); font-size: 0.8rem; font-weight: 600;
            padding: 5px 12px; border: 1.5px solid var(--mauve-text); border-radius: 10px;
            background: white; transition: 0.2s; cursor: none !important;
        }
        .jump-btn:hover { background: var(--soft-pink); }

        /* --- СЕКЦИИ ПРОЕКТОВ (БОЛЕЕ КОМПАКТНЫЕ) --- */
        .project-section {
            padding: 120px 20px 60px;
            display: flex; flex-direction: column; align-items: center;
            border-bottom: 2px dashed var(--soft-pink);
        }

        .display-unit { position: relative; width: 750px; margin-bottom: 30px; }

        .browser-frame {
            width: 100%; height: 450px; background: white; border: 3px solid var(--mauve-text);
            border-radius: 20px; box-shadow: 12px 12px 0px var(--soft-pink);
            overflow: hidden; position: relative; z-index: 2;
        }
        .browser-top { height: 30px; background: var(--soft-pink); border-bottom: 3px solid var(--mauve-text); display: flex; align-items: center; padding: 0 12px; gap: 6px; }
        .b-dot { width: 8px; height: 8px; border: 2px solid var(--mauve-text); border-radius: 50%; background: white; }

        .browser-content { width: 100%; height: calc(100% - 30px); position: relative; overflow: hidden; }
        .screen-slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: 0.5s; background-size: cover; background-position: center; }
        .screen-slide.active { opacity: 1; }

        .phone-mockup {
            position: absolute; right: -60px; bottom: -30px;
            width: 170px; height: 340px; background: white;
            border: 3px solid var(--mauve-text); border-radius: 30px;
            box-shadow: 8px 8px 0px var(--strong-pink);
            z-index: 5; overflow: hidden;
            animation: floaty 6s infinite ease-in-out;
        }
        @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .phone-mockup img { width: 100%; height: 100%; object-fit: cover; }

        .proj-controls { display: flex; gap: 12px; margin-bottom: 20px; }
        .arrow-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--mauve-text);
            background: white; box-shadow: 3px 3px 0px var(--soft-pink); cursor: none !important;
            display: flex; align-items: center; justify-content: center;
        }

        .proj-meta { text-align: center; }
        .proj-meta h2 { font-family: 'Comfortaa'; font-size: 1.8rem; margin: 5px 0; }
        .proj-meta p { opacity: 0.7; font-size: 0.9rem; max-width: 500px; }

        /* Чередование сторон */
        .project-section.alt .phone-mockup { right: auto; left: -60px; box-shadow: -8px 8px 0px var(--strong-pink); }

        @media (max-width: 1000px) {
            .display-unit { width: 95%; }
            .phone-mockup { display: none; }
            .jump-menu { display: none; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="bg-gradient"></div>
    <canvas id="stars-canvas"></canvas>

    <nav class="top-nav">
        <a href="catalog.html" class="back-link">← Back to Catalog</a>
        
        <div class="jump-menu">
            <a href="#site1" class="jump-btn">Beauty</a>
            <a href="#site2" class="jump-btn">Coffee</a>
            <a href="#site3" class="jump-btn">Art</a>
            <a href="#site4" class="jump-btn">Yoga</a>
        </div>
    </nav>

    <section class="project-section" id="site1">
        <div class="display-unit">
            <div class="browser-frame">
                <div class="browser-top"><div class="b-dot"></div><div class="b-dot"></div><div class="b-dot"></div></div>
                <div class="browser-content">
                    <div class="screen-slide active" style="background-image: url('project1/desktop_1.png')"></div>
                    <div class="screen-slide" style="background-image: url('project1/desktop_2.png')"></div>
                </div>
            </div>
            <div class="phone-mockup">
                <img src="project1/mobile_main.jpg">
            </div>
        </div>
        <div class="proj-controls">
            <button class="arrow-btn" onclick="step(this, -1)">❮</button>
            <button class="arrow-btn" onclick="step(this, 1)">❯</button>
        </div>
        <div class="proj-meta">
            <h2>Beauty Store</h2>
            <p>A clean and aesthetic online store for organic beauty products.</p>
        </div>
    </section>

    <section class="project-section alt" id="site2">
        <div class="display-unit">
            <div class="browser-frame">
                <div class="browser-top"><div class="b-dot"></div><div class="b-dot"></div><div class="b-dot"></div></div>
                <div class="browser-content">
                    <div class="screen-slide active" style="background-image: url('project2/desktop_1.png')"></div>
                    <div class="screen-slide" style="background-image: url('project2/desktop_2.png')"></div>
                </div>
            </div>
            <div class="phone-mockup">
                <img src="project2/mobile_main.jpg">
            </div>
        </div>
        <div class="proj-controls">
            <button class="arrow-btn" onclick="step(this, -1)">❮</button>
            <button class="arrow-btn" onclick="step(this, 1)">❯</button>
        </div>
        <div class="proj-meta">
            <h2>Morning Brew</h2>
            <p>Modern coffee shop landing page with interactive menu and cozy vibes.</p>
        </div>
    </section>

    <script>
        function step(btn, dir) {
            const container = btn.closest('.project-section').querySelector('.browser-content');
            const slides = container.querySelectorAll('.screen-slide');
            let activeIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[activeIdx].classList.remove('active');
            activeIdx = (activeIdx + dir + slides.length) % slides.length;
            slides[activeIdx].classList.add('active');
        }

        // --- КУРСОР И ЗВЕЗДЫ ---
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if (Math.random() > 0.6) {
                const s = document.createElement('div');
                s.className = 'sparkle'; document.body.appendChild(s);
                const size = Math.random()*7+2;
                s.style.width = size+'px'; s.style.height = size+'px';
                s.style.left = e.clientX+'px'; s.style.top = e.clientY+'px';
                s.animate([{opacity:1}, {opacity:0, transform:`translate(${(Math.random()-0.5)*60}px, ${(Math.random()-0.5)*60}px) scale(0)`}], 1000);
                setTimeout(() => s.remove(), 1000);
            }
        });

        const c = document.getElementById('stars-canvas');
        const ctx = c.getContext('2d');
        let pts = [];
        function res() { c.width = window.innerWidth; c.height = window.innerHeight; }
        window.addEventListener('resize', res); res();
        for(let i=0; i<70; i++) pts.push({x:Math.random()*c.width, y:Math.random()*c.height, s:Math.random()*1.5, o:Math.random(), sp:0.005});
        function draw() {
            ctx.clearRect(0,0,c.width,c.height);
            pts.forEach(p => { p.o+=p.sp; if(p.o>1||p.o<0) p.sp=-p.sp; ctx.globalAlpha=p.o; ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
