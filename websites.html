<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portfolio | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }
        body.visible { opacity: 1; }

        /* --- ФИКСИРОВАННАЯ НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 20px 0; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            position: fixed;
            top: 0; 
            z-index: 2000;
            background: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px dashed var(--soft-pink);
        }
        .nav-btn { 
            text-decoration: none; color: var(--brown-outline); font-weight: 700;
            padding: 10px 24px; border: 2px solid var(--brown-outline); border-radius: 50px;
            background: white; box-shadow: 4px 4px 0px var(--soft-pink); transition: 0.3s;
            cursor: none !important;
        }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 6px 6px 0px var(--strong-pink); }

        /* --- ТЕК-СТЕК СЛЕВА --- */
        .side-stack {
            position: fixed;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1500;
        }
        .stack-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 5px;
            opacity: 0.7;
        }
        .tool-tag {
            background: white;
            border: 2px solid var(--brown-outline);
            padding: 7px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 3px 3px 0px var(--soft-pink);
            transition: 0.3s;
        }
        .tool-tag:hover { transform: translateX(8px); background: var(--soft-pink); }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed; width: 25px; height: 25px; background: white;
            border: 2px solid var(--brown-outline); border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg); pointer-events: none;
            z-index: 10000; box-shadow: 2px 2px 0px var(--soft-pink);
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        .main-container {
            padding-top: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .project-card {
            position: relative;
            width: 850px;
            margin-bottom: 80px;
        }

        /* БРАУЗЕР */
        .browser-window {
            width: 100%;
            height: 480px;
            background: white;
            border: 3.5px solid var(--brown-outline);
            border-radius: 25px;
            box-shadow: 15px 15px 0px var(--soft-pink);
            overflow: hidden;
            position: relative;
        }
        .browser-bar {
            height: 35px;
            background: var(--soft-pink);
            border-bottom: 3.5px solid var(--brown-outline);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 8px;
        }
        .dot { width: 10px; height: 10px; border: 2px solid var(--brown-outline); border-radius: 50%; background: white; }

        .slider-content { height: 100%; position: relative; }
        .slide { 
            position: absolute; width: 100%; height: 100%; 
            background-size: cover; background-position: top;
            opacity: 0; transition: opacity 0.6s ease;
        }
        .slide.active { opacity: 1; }

        /* ТЕЛЕФОН (ЧЕТКАЯ КАРТИНКА) */
        .phone-mockup {
            position: absolute;
            right: -70px;
            bottom: -50px;
            width: 200px;
            height: 410px;
            background: white;
            border: 3.5px solid var(--brown-outline);
            border-radius: 40px;
            box-shadow: 12px 12px 0px var(--strong-pink);
            z-index: 10;
            overflow: hidden;
            animation: float 5s infinite ease-in-out;
        }
        .phone-mockup img {
            width: 100%; height: 100%; object-fit: cover;
            /* Улучшение четкости */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* ИНФОРМАЦИЯ */
        .project-info {
            text-align: center;
            max-width: 650px;
            margin-top: 40px;
        }
        .project-info h2 { font-family: 'Quicksand'; font-size: 2.2rem; color: var(--brown-outline); margin-bottom: 15px; }
        .project-info p { line-height: 1.8; color: var(--brown-outline); font-size: 1rem; }

        .controls { display: flex; gap: 20px; margin: 25px 0; }
        .nav-arrow {
            width: 55px; height: 55px; background: white; border: 2.5px solid var(--brown-outline);
            border-radius: 50%; box-shadow: 4px 4px 0px var(--soft-pink);
            font-size: 1.5rem; transition: 0.3s; cursor: none !important;
        }
        .nav-arrow:hover { transform: scale(1.1); box-shadow: 6px 6px 0px var(--strong-pink); }

        @media (max-width: 1200px) {
            .side-stack { display: none; }
            .project-card { width: 90%; }
            .phone-mockup { right: 0; bottom: -80px; width: 160px; height: 320px; }
        }
    </style>
</head>
