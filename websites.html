<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTAGME | Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #63414C;
            --bg-cream: #FDFBF7;
        }

        /* --- БАЗОВЫЕ СТИЛИ --- */
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-cream);
            margin: 0; cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
        }

        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; background: linear-gradient(135deg, #fdfbf7, #ffdeeb, #fdfbf7, #e8d5ff, #fdfbf7); background-size: 500% 500%; animation: gradientMove 20s ease infinite; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        #custom-cursor { position: fixed; width: 25px; height: 25px; background: white; border: 2px solid var(--mauve-text); border-radius: 2px 50% 50% 50%; transform: translate(-50%, -50%) rotate(-45deg); pointer-events: none; z-index: 10000; box-shadow: 2px 2px 0px var(--soft-pink); }
        .sparkle { position: fixed; background: var(--strong-pink); border-radius: 50%; pointer-events: none; z-index: 9999; }

        /* --- ФИКСИРОВАННОЕ МЕНЮ --- */
        .sticky-nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; padding: 10px 20px;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border: 2px solid var(--mauve-text); border-radius: 50px;
            box-shadow: 6px 6px 0px var(--soft-pink); z-index: 1000;
        }
        .nav-item {
            text-decoration: none; color: var(--mauve-text); font-weight: 700; font-size: 0.9rem;
            padding: 5px 12px; transition: 0.3s; cursor: none !important;
        }
        .nav-item:hover { color: var(--strong-pink); }

        /* --- СЕКЦИИ ПРОЕКТОВ --- */
        .project-block {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 100px 20px; box-sizing: border-box;
            border-bottom: 2px dashed var(--strong-pink);
        }

        .display-wrapper { position: relative; width: 800px; margin-bottom: 40px; }
        
        .browser-frame {
            width: 100%; height: 480px; background: white; border: 3px solid var(--mauve-text);
            border-radius: 20px; box-shadow: 15px 15px 0px var(--soft-pink);
            overflow: hidden; position: relative; z-index: 2;
        }
        .browser-top { height: 35px; background: var(--soft-pink); border-bottom: 3px solid var(--mauve-text); display: flex; align-items: center; padding: 0 15px; gap: 8px; }
        .b-dot { width: 10px; height: 10px; border: 2px solid var(--mauve-text); border-radius: 50%; background: white; }

        .browser-content { width: 100%; height: calc(100% - 35px); position: relative; overflow: hidden; }
        .inner-slide {
            width: 100%; height: 100%; background-size: cover; background-position: center;
            display: none; /* Слайды внутри будем менять по кнопкам */
        }
        .inner-slide.active { display: block; }

        /* Телефон */
        .phone-overlay {
            position: absolute; right: -80px; bottom: -40px;
            width: 190px; height: 380px; background: white;
            border: 3px solid var(--mauve-text); border-radius: 35px;
            box-shadow: 10px 10px 0px var(--strong-pink);
            z-index: 5; overflow: hidden;
            animation: floaty 5s infinite ease-in-out;
        }
        @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .phone-overlay img { width: 100%; height: 100%; object-fit: cover; }

        /* Переключалки внутри монитора */
        .mini-arrows { display: flex; gap: 10px; margin-top: 20px; }
        .btn-sm {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--mauve-text);
            background: white; box-shadow: 3px 3px 0px var(--soft-pink);
            cursor: none !important; display: flex; align-items: center; justify-content: center;
        }

        .info-text { text-align: center; max-width: 600px; margin-top: 20px; }
        .info-text h2 { font-family: 'Comfortaa'; font-size: 2rem; margin: 10px 0; }

        /* Чередование сторон (телефон слева) */
        .project-block.alt .phone-overlay { right: auto; left: -80px; box-shadow: -10px 10px 0px var(--strong-pink); }

        @media (max-width: 1000px) {
            .display-wrapper { width: 90%; }
            .phone-overlay { display: none; }
            .sticky-nav { width: 95%; font-size: 0.7rem; gap: 5px; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="bg-gradient"></div>
    <canvas id="stars-canvas"></canvas>

    <nav class="sticky-nav">
        <a href="index.html" class="nav-item">Home</a>
        <a href="#proj1" class="nav-item">Beauty</a>
        <a href="#proj2" class="nav-item">Coffee</a>
        <a href="#proj3" class="nav-item">Art</a>
    </nav>

    <section class="project-block" id="proj1">
        <div class="display-wrapper">
            <div class="browser-frame">
                <div class="browser-top"><div class="b-dot"></div><div class="b-dot"></div><div class="b-dot"></div></div>
                <div class="browser-content">
                    <div class="inner-slide active" style="background-image: url('project1/desktop_1.png')"></div>
                    <div class="inner-slide" style="background-image: url('project1/desktop_2.png')"></div>
                </div>
            </div>
            <div class="phone-overlay">
                <img src="project1/mobile_main.jpg">
            </div>
        </div>
        <div class="mini-arrows">
            <button class="btn-sm" onclick="moveSub(this, -1)">❮</button>
            <button class="btn-sm" onclick="moveSub(this, 1)">❯</button>
        </div>
        <div class="info-text">
            <h2>Beauty Boutique</h2>
            <p>A soft-toned landing page for a natural cosmetics brand.</p>
        </div>
    </section>

    <section class="project-block alt" id="proj2">
        <div class="display-wrapper">
            <div class="browser-frame">
                <div class="browser-top"><div class="b-dot"></div><div class="b-dot"></div><div class="b-dot"></div></div>
                <div class="browser-content">
                    <div class="inner-slide active" style="background-image: url('project2/desktop_1.png')"></div>
                    <div class="inner-slide" style="background-image: url('project2/desktop_2.png')"></div>
                </div>
            </div>
            <div class="phone-overlay">
                <img src="project2/mobile_main.jpg">
            </div>
        </div>
        <div class="mini-arrows">
            <button class="btn-sm" onclick="moveSub(this, -1)">❮</button>
            <button class="btn-sm" onclick="moveSub(this, 1)">❯</button>
        </div>
        <div class="info-text">
            <h2>The Morning Coffee</h2>
            <p>Minimalist coffee shop interface with booking system.</p>
        </div>
    </section>

    <script>
        // Функция для переключения слайдов ВНУТРИ каждого блока
        function moveSub(btn, dir) {
            const container = btn.closest('.project-block').querySelector('.browser-content');
            const slides = container.querySelectorAll('.inner-slide');
            let activeIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            
            slides[activeIdx].classList.remove('active');
            activeIdx = (activeIdx + dir + slides.length) % slides.length;
            slides[activeIdx].classList.add('active');
        }

        // --- ТВОЙ КУРСОР И ЗВЕЗДЫ ---
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if (Math.random() > 0.6) {
                const s = document.createElement('div');
                s.className = 'sparkle'; document.body.appendChild(s);
                s.style.width = '5px'; s.style.height = '5px';
                s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
                s.animate([{opacity:1}, {opacity:0, transform: `translate(${(Math.random()-0.5)*50}px, ${(Math.random()-0.5)*50}px)`}], 1000);
                setTimeout(() => s.remove(), 1000);
            }
        });

        const c = document.getElementById('stars-canvas');
        const ctx = c.getContext('2d');
        let pts = [];
        function res() { c.width = window.innerWidth; c.height = window.innerHeight; }
        window.addEventListener('resize', res); res();
        for(let i=0; i<80; i++) pts.push({x:Math.random()*c.width, y:Math.random()*c.height, s:Math.random()*1.5, o:Math.random(), sp:0.005});
        function draw() {
            ctx.clearRect(0,0,c.width,c.height);
            pts.forEach(p => { p.o+=p.sp; if(p.o>1||p.o<0) p.sp=-p.sp; ctx.globalAlpha=p.o; ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fill(); });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
