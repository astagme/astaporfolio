<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portfolio | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            padding: 0;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            cursor: none !important; /* Курсор только для десктопа */
        }

        /* --- ФИКСИРОВАННАЯ НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 20px 0; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            position: fixed;
            top: 0; 
            left: 0;
            z-index: 2000;
            background: rgba(253, 251, 247, 0.9);
            backdrop-filter: blur(5px);
            border-bottom: 2px dashed var(--soft-pink);
        }

        .nav-btn { 
            text-decoration: none; 
            color: var(--brown-outline); 
            font-weight: 700;
            padding: 10px 20px; 
            border: 2px solid var(--brown-outline); 
            border-radius: 50px;
            background: white; 
            box-shadow: 4px 4px 0px var(--soft-pink); 
            transition: 0.2s;
        }

        .nav-btn:hover { transform: translateY(-3px); box-shadow: 6px 6px 0px var(--strong-pink); }

        /* --- СПИСОК ИНСТРУМЕНТОВ СЛЕВА --- */
        .side-tools {
            position: fixed;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .tool-box {
            background: white;
            border: 2px solid var(--brown-outline);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 3px 3px 0px var(--soft-pink);
            white-space: nowrap;
        }

        /* --- ГЛАВНЫЙ КОНТЕНТ --- */
        .content-wrapper {
            padding-top: 130px; /* Отступ под меню */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .project-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            margin-bottom: 100px;
        }

        /* ОКНО БРАУЗЕРА */
        .browser-mockup {
            width: 100%;
            height: 450px;
            background: #fff;
            border: 3px solid var(--brown-outline);
            border-radius: 20px;
            box-shadow: 12px 12px 0px var(--soft-pink);
            overflow: hidden;
            position: relative;
        }

        .browser-header {
            height: 30px;
            background: var(--soft-pink);
            border-bottom: 3px solid var(--brown-outline);
            display: flex;
            align-items: center;
            padding-left: 10px;
            gap: 5px;
        }

        .dot { width: 8px; height: 8px; border: 2px solid var(--brown-outline); border-radius: 50%; background: white; }

        .browser-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: top;
        }

        /* ТЕЛЕФОН (ЧЕТКОСТЬ) */
        .phone-mockup {
            position: absolute;
            right: -50px;
            bottom: -40px;
            width: 180px;
            height: 370px;
            background: white;
            border: 3px solid var(--brown-outline);
            border-radius: 35px;
            box-shadow: 8px 8px 0px var(--strong-pink);
            z-index: 10;
            overflow: hidden;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .phone-mockup img { width: 100%; height: 100%; object-fit: cover; }

        /* ТЕКСТ И КНОПКИ */
        .info-box { text-align: center; margin-top: 40px; max-width: 600px; }
        .info-box h2 { font-family: 'Quicksand'; font-size: 2rem; color: var(--brown-outline); }
        
        .arrow-nav { display: flex; gap: 20px; margin: 20px 0; justify-content: center; }
        .btn-round {
            width: 50px; height: 50px; border: 2px solid var(--brown-outline);
            border-radius: 50%; background: white; box-shadow: 3px 3px 0px var(--soft-pink);
            font-size: 1.2rem; cursor: none !important;
        }

        /* КУРСОР */
        #cursor {
            position: fixed; width: 20px; height: 20px; border: 2px solid var(--brown-outline);
            background: white; border-radius: 2px 50% 50% 50%; 
            transform: rotate(-45deg); pointer-events: none; z-index: 9999;
        }

        @media (max-width: 1000px) {
            .side-tools { display: none; }
            .phone-mockup { display: none; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Catalog</a>
        <a href="about.html" class="nav-btn">About me</a>
    </nav>

    <div class="side-tools">
        <div class="tool-box">Figma</div>
        <div class="tool-box">Photoshop</div>
        <div class="tool-box">Illustrator</div>
        <div class="tool-box">HTML / CSS</div>
        <div class="tool-box">JavaScript</div>
    </div>

    <main class="content-wrapper">
        <section class="project-container">
            <div class="browser-mockup">
                <div class="browser-header">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
                <div class="browser-img" style="background-image: url('project1/desktop_1.png');"></div>
            </div>

            <div class="phone-mockup">
                <img src="project1/mobile_main
