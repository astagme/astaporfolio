<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Websites | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
            --accent-glow: rgba(255, 219, 234, 0.6);
        }

        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            overflow-x: hidden;
        }

        body.visible { opacity: 1 !important; }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed;
            width: 25px; height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cursor-active { transform: translate(-50%, -50%) rotate(-45deg) scale(1.6); background: var(--soft-pink) !important; }
        .sparkle { position: fixed; background: var(--strong-pink); border-radius: 50%; pointer-events: none; z-index: 999999; }

        /* --- НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; padding: 25px; 
            display: flex; justify-content: center; gap: 15px;
            position: fixed; top: 0; left: 0; z-index: 1000;
            background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(12px);
            border-bottom: 2px dashed var(--soft-pink);
        }

        .nav-btn, .arrow-btn, .tool-tag {
            text-decoration: none; color: var(--brown-outline); font-weight: 700;
            background: white; border: 2px solid var(--brown-outline);
            box-shadow: 4px 4px 0px var(--soft-pink);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important; display: flex; align-items: center; justify-content: center;
        }

        .nav-btn { padding: 10px 24px; font-size: 0.9rem; border-radius: 50px; }
        .arrow-btn { width: 50px; height: 50px; font-size: 1.3rem; border-radius: 50%; }
        .nav-btn:hover, .arrow-btn:hover { transform: translateY(-5px); box-shadow: 7px 7px 0px var(--strong-pink); }

        /* --- УЛУЧШЕННЫЕ ИНСТРУМЕНТЫ (SIDE TOOLS) --- */
        .side-tools {
            position: fixed;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 900;
        }

        .tool-label { 
            font-family: 'Comfortaa'; font-size: 0.7rem; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 2px; color: var(--brown-outline);
            margin-bottom: 5px; position: relative;
        }

        .tool-tag {
            padding: 10px 18px;
            font-size: 0.75rem;
            border-radius: 15px;
            white-space: nowrap;
            justify-content: flex-start;
            gap: 8px;
            position: relative;
        }

        .tool-tag::before {
            content: ''; position: absolute; width: 6px; height: 6px; 
            background: var(--strong-pink); border-radius: 50%; left: -15px;
            opacity: 0; transition: 0.3s;
        }

        .tool-tag:hover {
            transform: translateX(12px) scale(1.05);
            background: #fff;
            box-shadow: 0px 0px 20px var(--accent-glow);
        }

        .tool-tag:hover::before { opacity: 1; left: -10px; }

        /* --- КОНТЕНТ --- */
        .project-section { padding: 180px 20px 100px; display: flex; flex-direction: column; align-items: center; }
        .display-unit { position: relative; width: 800px; margin-bottom: 50px; }

        .browser-frame {
            width: 100%; height: 480px; background: white;
            border: 3.5px solid var(--brown-outline); border-radius: 30px;
            box-shadow: 18px 18px 0px var(--soft-pink);
            overflow: hidden; position: relative; z-index: 2;
        }

        .browser-top { height: 38px; background: var(--soft-pink); border-bottom: 3.5px solid var(--brown-outline); display: flex; align-items: center; padding: 0 18px; gap: 8px; }
        .b-dot { width: 11px; height: 11px; border: 2.5px solid var(--brown-outline); border-radius: 50%; background: white; }

        .browser-content { width: 100%; height: calc(100% - 38px); position: relative; }
        .screen-slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: 0.8s ease-in-out; background-size: cover; background-position: top center; }
        .screen-slide.active { opacity: 1; }

        .phone-mockup {
            position: absolute; right: -80px; bottom: -50px;
            width: 200px; height: 400px; background: white;
            border: 4px solid var(--brown-outline); border-radius: 40px;
            box-shadow: 12px 12px 0px var(--strong-pink);
            z-index: 5; overflow: hidden;
            animation: floaty 6s infinite ease-in-out;
        }
        @keyframes floaty { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(2deg); } }

        /* --- ОПИСАНИЕ И ТИПОГРАФИКА --- */
        .proj-meta { text-align: center; max-width: 650px; }
        #typing-title { font-family: 'Comfortaa'; font-size: 2.5rem; color: var(--brown-outline); min-height: 3rem; }
        
        .tag-container { display: flex; justify-content: center; gap: 12px; margin: 20px 0; }
        .tag { 
            background: white; border: 2px solid var(--brown-outline); 
            padding: 7px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 700;
            transition: 0.3s;
        }
        .tag:hover { background: var(--soft-pink); transform: rotate(-3deg); }

        .proj-controls { display: flex; gap: 20px; margin-bottom: 35px; }

        @media (max-width: 1200px) {
            .side-tools { display: none; }
            .display-unit { width: 90%; }
            .phone-mockup { display: none; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Catalog</a>
        <a href="about.html" class="nav-btn">About me</a>
    </nav>

    <aside class="side-tools">
        <div class="tool-label">Tech Stack</div>
        <div class="tool-tag"><span>🎨</span> Figma</div>
        <div class="tool-tag"><span>✨</span> Illustrator</div>
        <div class="tool-tag"><span>💻</span> HTML / CSS</div>
        <div class="tool-tag"><span>⚡</span> JavaScript (ES6+)</div>
        <div class="tool-tag"><span>🚀</span> Framer</div>
    </aside>

    <section class="project-section">
        <div class="display-unit">
            <div class="browser-frame">
                <div class="browser-top">
                    <div class="b-dot"></div><div class="b-dot"></div><div class="b-dot"></div>
                </div>
                <div class="browser-content">
                    <div class="screen-slide active" style="background-image: url('project1/desktop_1.png');"></div>
                    <div class="screen-slide" style="background-image: url('project1/desktop_2.png');"></div>
                </div>
            </div>
            <div class="phone-mockup">
                <img src="project1/mobile_main.jpg" alt="Mobile Preview" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
        </div>

        <div class="proj-controls">
            <button class="arrow-btn" onclick="step(this, -1)">❮</button>
            <button class="arrow-btn" onclick="step(this, 1)">❯</button>
        </div>

        <div class="proj-meta">
            <h2 id="typing-title"></h2>
            <div class="tag-container">
                <span class="tag">Hand-drawn</span>
                <span class="tag">Clean Code</span>
                <span class="tag">Responsive</span>
            </div>
            <p>
                A bespoke personal portfolio designed to showcase my unique visual identity. 
                <strong>Developed with a focus on smooth animations and pixel-perfect design.</strong>
            </p>
        </div>
    </section>

    <script>
        // Проявление
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { 
                document.body.classList.add('visible');
                typeWriter("Personal Identity Site", "typing-title");
            }, 100);
        });

        // Эффект печати
        function typeWriter(text, elementId) {
            let i = 0;
            const el = document.getElementById(elementId);
            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();
        }

        // Курсор
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if (Math.random() > 0.75) createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            document.body.appendChild(s);
            const size = Math.random() * 6 + 2;
            s.style.width = size + 'px'; s.style.height = size + 'px';
            s.style.left = x + 'px'; s.style.top = y + 'px';
            s.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*70}px, ${(Math.random()-0.5)*70}px) scale(0)`, opacity: 0 }
            ], { duration: 800 });
            setTimeout(() => s.remove(), 800);
        }

        function step(btn, dir) {
            const container = btn.closest('.project-section').querySelector('.browser-content');
            const slides = container.querySelectorAll('.screen-slide');
            let activeIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[activeIdx].classList.remove('active');
            activeIdx = (activeIdx + dir + slides.length) % slides.length;
            slides[activeIdx].classList.add('active');
        }

        // Интерактив
        document.querySelectorAll('a, button, .tool-tag, .tag').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });

        // Уход страницы
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href.includes('.html')) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = href; }, 600);
                }
            });
        });
    </script>
</body>
</html>
