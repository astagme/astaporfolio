<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Websites | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        /* --- ПЛАВНОСТЬ СТРАНИЦЫ --- */
        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Quicksand', sans-serif;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            overflow-x: hidden;
        }

        body.visible { opacity: 1 !important; }

        /* --- КУРСОР И ИСКРЫ --- */
        #custom-cursor {
            position: fixed;
            width: 25px; height: 25px;
            background: white;
            border: 2px solid var(--brown-outline);
            border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            pointer-events: none;
            z-index: 1000000;
            box-shadow: 2px 2px 0px var(--soft-pink);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s;
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-45deg) scale(1.5) !important;
            background: var(--soft-pink) !important;
        }

        .sparkle {
            position: fixed;
            background: var(--strong-pink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
        }

        /* --- НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; padding: 30px; 
            display: flex; justify-content: center; gap: 20px;
            position: fixed; top: 0; left: 0; z-index: 1000;
            background: rgba(253, 251, 247, 0.8); backdrop-filter: blur(8px);
        }

        .nav-btn, .arrow-btn {
            text-decoration: none; color: var(--brown-outline); font-weight: 700;
            background: white; border: 2px solid var(--brown-outline);
            border-radius: 50px; box-shadow: 4px 4px 0px var(--soft-pink);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: none !important; display: flex; align-items: center; justify-content: center;
        }

        .nav-btn { padding: 10px 25px; font-size: 0.9rem; }
        .arrow-btn { width: 50px; height: 50px; font-size: 1.3rem; }

        .nav-btn:hover, .arrow-btn:hover {
            transform: translateY(-5px);
            box-shadow: 7px 7px 0px var(--strong-pink);
        }

        /* --- СЕКЦИЯ ПРОЕКТА --- */
        .project-section {
            padding: 160px 20px 100px;
            display: flex; flex-direction: column; align-items: center;
        }

        .display-unit { position: relative; width: 780px; margin-bottom: 50px; }

        .browser-frame {
            width: 100%; height: 460px; background: white;
            border: 3px solid var(--brown-outline); border-radius: 25px;
            box-shadow: 15px 15px 0px var(--soft-pink);
            overflow: hidden; position: relative; z-index: 2;
        }

        .browser-top { height: 35px; background: var(--soft-pink); border-bottom: 3px solid var(--brown-outline); display: flex; align-items: center; padding: 0 15px; gap: 8px; }
        .b-dot { width: 10px; height: 10px; border: 2px solid var(--brown-outline); border-radius: 50%; background: white; }

        .browser-content { width: 100%; height: calc(100% - 35px); position: relative; }
        .screen-slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: 0.8s ease-in-out; background-size: cover; background-position: top center; }
        .screen-slide.active { opacity: 1; }

        .phone-mockup {
            position: absolute; right: -70px; bottom: -40px;
            width: 190px; height: 380px; background: white;
            border: 3.5px solid var(--brown-outline); border-radius: 38px;
            box-shadow: 10px 10px 0px var(--strong-pink);
            z-index: 5; overflow: hidden;
            animation: floaty 5s infinite ease-in-out;
        }
        @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .phone-mockup img { width: 100%; height: 100%; object-fit: cover; image-rendering: -webkit-optimize-contrast; }

        /* --- ТЕКСТ И ТЕГИ --- */
        .proj-meta { text-align: center; max-width: 650px; margin-top: 20px; }
        .proj-meta h2 { font-family: 'Comfortaa'; font-size: 2.2rem; color: var(--brown-outline); margin-bottom: 15px; }
        
        .tag-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tag { background: white; border: 2px solid var(--brown-outline); padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; box-shadow: 3px 3px 0px var(--soft-pink); }

        .proj-controls { display: flex; gap: 20px; margin-bottom: 30px; }

        @media (max-width: 1000px) {
            .display-unit { width: 90%; }
            .phone-mockup { display: none; }
            #custom-cursor { display: none !important; }
            body { cursor: auto !important; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="catalog.html" class="nav-btn">← Back to Catalog</a>
        <a href="index.html" class="nav-btn">Home</a>
    </nav>

    <section class="project-section">
        <div class="display-unit">
            <div class="browser-frame">
                <div class="browser-top">
                    <div class="b-dot"></div><div class="b-dot"></div><div class="b-dot"></div>
                </div>
                <div class="browser-content">
                    <div class="screen-slide active" style="background-image: url('project1/desktop_1.png');"></div>
                    <div class="screen-slide" style="background-image: url('project1/desktop_2.png');"></div>
                </div>
            </div>
            <div class="phone-mockup">
                <img src="project1/mobile_main.jpg" alt="Mobile Preview">
            </div>
        </div>

        <div class="proj-controls">
            <button class="arrow-btn" onclick="step(this, -1)">❮</button>
            <button class="arrow-btn" onclick="step(this, 1)">❯</button>
        </div>

        <div class="proj-meta">
            <div class="tag-container">
                <span class="tag">Figma</span>
                <span class="tag">UI/UX</span>
                <span class="tag">Framer</span>
            </div>
            <h2>Personal Identity Site</h2>
            <p>
                A bespoke personal portfolio designed to showcase my unique visual identity. 
                Every element was crafted with attention to detail.
            </p>
        </div>
    </section>

    <script>
        // Проявление страницы
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.body.classList.add('visible'); }, 50);
        });

        // Курсор и искры
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if (Math.random() > 0.7) createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            document.body.appendChild(s);
            const size = Math.random() * 6 + 2;
            s.style.width = size + 'px'; s.style.height = size + 'px';
            s.style.left = x + 'px'; s.style.top = y + 'px';
            const dx = (Math.random() - 0.5) * 60;
            const dy = (Math.random() - 0.5) * 60;
            s.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
            ], { duration: 800, easing: 'ease-out' });
            setTimeout(() => s.remove(), 800);
        }

        // Слайдер
        function step(btn, dir) {
            const container = btn.closest('.project-section').querySelector('.browser-content');
            const slides = container.querySelectorAll('.screen-slide');
            let activeIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[activeIdx].classList.remove('active');
            activeIdx = (activeIdx + dir + slides.length) % slides.length;
            slides[activeIdx].classList.add('active');
        }

        // Интерактив курсора
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-active'));
        });

        // Плавный уход при клике
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href.includes('.html')) {
                    e.preventDefault();
                    document.body.classList.remove('visible');
                    setTimeout(() => { window.location.href = href; }, 600);
                }
            });
        });
    </script>
</body>
</html>
