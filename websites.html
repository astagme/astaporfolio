<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Gallery | ASTAGME</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #FFDBEA;
            --strong-pink: #F4C2D7; 
            --mauve-text: #A67081;
            --bg-cream: #FDFBF7;
            --brown-outline: #63414C;
        }

        /* --- БАЗОВЫЕ НАСТРОЙКИ --- */
        body {
            background-color: var(--bg-cream);
            margin: 0;
            cursor: none !important;
            color: var(--mauve-text);
            font-family: 'Comfortaa', cursive;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body.visible { opacity: 1; }

        /* --- ФИКСИРОВАННАЯ НАВИГАЦИЯ --- */
        .nav-header { 
            width: 100%; 
            padding: 20px 0; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            position: fixed;
            top: 0; 
            z-index: 2000;
            background: rgba(253, 251, 247, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 2px dashed var(--soft-pink);
        }

        .nav-btn { 
            text-decoration: none; color: var(--brown-outline); font-weight: 700;
            padding: 10px 24px; border: 2px solid var(--brown-outline); border-radius: 50px;
            background: white; box-shadow: 4px 4px 0px var(--soft-pink); transition: 0.3s;
        }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 6px 6px 0px var(--strong-pink); }

        /* --- БОКОВАЯ ПАНЕЛЬ ИНСТРУМЕНТОВ --- */
        .side-stack {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1500;
        }

        .tool-item {
            background: white;
            border: 2px solid var(--brown-outline);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            box-shadow: 3px 3px 0px var(--soft-pink);
            transition: 0.3s;
            white-space: nowrap;
        }
        .tool-item:hover { transform: translateX(5px); background: var(--soft-pink); }

        /* --- КУРСОР --- */
        #custom-cursor {
            position: fixed; width: 25px; height: 25px; background: white;
            border: 2px solid var(--brown-outline); border-radius: 2px 50% 50% 50%;
            transform: translate(-50%, -50%) rotate(-45deg); pointer-events: none;
            z-index: 10000; box-shadow: 2px 2px 0px var(--soft-pink);
        }

        /* --- СЕКЦИЯ ПРОЕКТА --- */
        .project-section {
            padding-top: 140px; /* Чтобы не пряталось под меню */
            padding-bottom: 100px;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .display-unit { 
            position: relative; 
            width: 100%;
            margin-bottom: 60px;
        }

        .browser-frame {
            width: 100%;
            height: 480px;
            background: white;
            border: 3px solid var(--brown-outline);
            border-radius: 25px;
            box-shadow: 15px 15px 0px var(--soft-pink);
            overflow: hidden;
            position: relative;
        }

        .browser-top {
            height: 35px;
            background: var(--soft-pink);
            border-bottom: 3px solid var(--brown-outline);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 8px;
        }

        .b-dot { width: 10px; height: 10px; border: 2px solid var(--brown-outline); border-radius: 50%; background: white; }

        .browser-content { height: 100%; width: 100%; background-color: #fff; }
        .screen-slide { 
            width: 100%; height: 100%; 
            background-size: cover; 
            background-position: top center;
        }

        /* ТЕЛЕФОН (ИСПРАВЛЕННОЕ КАЧЕСТВО И СЛОЙ) */
        .phone-mockup {
            position: absolute;
            right: -60px;
            bottom: -40px;
            width: 190px;
            height: 390px;
            background: white;
            border: 3.5px solid var(--brown-outline);
            border-radius: 38px;
            box-shadow: 10px 10px 0px var(--strong-pink);
            z-index: 10;
            overflow: hidden;
            animation: floaty 6s infinite ease-in-out;
        }

        @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .phone-mockup img { 
            width: 100%; height: 100%; object-fit: cover; 
            image-rendering: -webkit-optimize-contrast; 
            image-rendering: crisp-edges;
        }

        /* ОПИСАНИЕ */
        .proj-meta { text-align: center; max-width: 650px; padding: 0 20px; }
        .proj-meta h2 { font-size: 2.2rem; margin-bottom: 15px; color: var(--brown-outline); font-family: 'Quicksand'; }
        .proj-meta p { line-height: 1.8; color: var(--brown-outline); font-size: 1rem; }

        .proj-controls { display: flex; gap: 20px; margin: 30px 0; }
        .arrow-btn {
            width: 55px; height: 55px; background: white; border: 2.5px solid var(--brown-outline);
            border-radius: 50%; box-shadow: 4px 4px 0px var(--soft-pink);
            font-size: 1.5rem; transition: 0.3s; cursor: none !important;
        }
        .arrow-btn:hover { transform: scale(1.1); box-shadow: 6px 6px 0px var(--strong-pink); }

        /* Адаптивность для боковой панели */
        @media (max-width: 1200px) {
            .side-stack { display: none; }
            .phone-mockup { right: 0; bottom: -60px; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="nav-header">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Catalog</a>
        <a href="about.html" class="nav-btn">About me</a>
    </nav>

    <aside class="side-stack">
        <div class="tool-item">Figma</div>
        <div class="tool-item">Photoshop</div>
        <div class="tool-item">Illustrator</div>
        <div class="tool-item">HTML / CSS</div>
        <div class="tool-item">JavaScript</div>
    </aside>

    <section class="project-section">
        <div class="display-unit">
            <div class="browser-frame">
                <div class="browser-top">
                    <div class="b-dot"></div><div class="b-dot"></div><div class="b-dot"></div>
                </div>
                <div class="browser-content">
                    <div class="screen-slide" style="background-image: url('project1/desktop_1.png');"></div>
                </div>
            </div>
            <div class="phone-mockup">
                <img src="project1/mobile_main.jpg" alt="High Quality Preview">
            </div>
        </div>

        <div class="proj-controls">
            <button class="arrow-btn">❮</button>
            <button class="arrow-btn">❯</button>
        </div>

        <div class="proj-meta">
            <h2>Personal Identity Site</h2>
            <p>
                A bespoke personal portfolio designed and developed from scratch to showcase my unique visual identity. 
                <strong>Every element, including custom icons, logo, and the functional code, was developed by me.</strong> 
            </p>
        </div>
    </section>

    <script>
        window.addEventListener('load', () => { document.body.classList.add('visible'); });

        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a, button, .tool-item').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1.5)';
                cursor.style.backgroundColor = 'var(--soft-pink)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) rotate(-45deg) scale(1)';
                cursor.style.backgroundColor = 'white';
            });
        });
    </script>
</body>
</html>
